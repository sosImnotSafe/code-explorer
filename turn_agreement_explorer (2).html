<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turn Agreement Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F5F6F3;
  --surface:#FFFFFF;
  --surface-2:#FBFBF9;
  --ink:#1B1E22;
  --ink-soft:#3A3E3B;
  --ink-muted:#71766D;
  --ink-faint:#9EA299;
  --line:#E2E4DC;
  --line-soft:#EDEEE8;
  --accent:#2F5D62;
  --accent-ink:#1E3F42;
  --accent-soft:#E3EDEC;
  --accent-soft-2:#CFE1DF;
  --warn:#A23B3B;
  --warn-soft:#F5E7E5;
  --good:#3D6E52;
  --good-soft:#E6EFE8;
  --amber:#B08B2A;
  --amber-soft:#F3ECD9;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:18px;
  --shadow-card:0 1px 2px rgba(27,30,34,0.04), 0 6px 16px rgba(27,30,34,0.05);
  --shadow-pop:0 8px 24px rgba(27,30,34,0.12), 0 2px 6px rgba(27,30,34,0.08);
  --font-display:'Fraunces', Georgia, serif;
  --font-body:'Inter', -apple-system, sans-serif;
  --font-mono:'JetBrains Mono', ui-monospace, monospace;

  --fam-unknown:#93958D;
  --fam-attitude:#6B4C9A;
  --fam-evidence:#2F5D62;
  --fam-extra:#71766D;
  --fam-fallacy:#A23B3B;
  --fam-future:#3D6E8C;
  --fam-invoke:#9C5A8C;
  --fam-lack:#5B6350;
  --fam-signal:#B08B2A;
  --fam-theme:#8C4A3D;
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:15px;
  -webkit-font-smoothing:antialiased;
}
::selection{ background:var(--accent-soft-2); }

.app{ display:flex; flex-direction:column; height:100vh; }

/* ---------- Topbar ---------- */
.topbar{
  display:flex; align-items:baseline; justify-content:space-between;
  padding:22px 32px 18px; border-bottom:1px solid var(--line);
  flex-shrink:0; gap:24px;
}
.topbar-left{ display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; }
.topbar h1{
  font-family:var(--font-display); font-weight:600; font-size:23px;
  letter-spacing:-0.01em; margin:0; color:var(--ink);
}
.topbar .subtitle{ font-size:13px; color:var(--ink-muted); font-style:italic; font-family:var(--font-display); }
.topbar-stats{
  display:flex; gap:22px; align-items:center;
  font-family:var(--font-mono); font-size:12.5px; color:var(--ink-muted); flex-shrink:0;
}
.topbar-stats b{ color:var(--accent-ink); font-weight:600; }
.topbar-stats .divider{ width:1px; height:18px; background:var(--line); }
.topbar-stats .match-rate{ color:var(--good); font-weight:600; }
.filters-toggle{
  display:none; align-items:center; gap:6px; background:var(--accent); color:#fff;
  border:none; padding:8px 14px; border-radius:20px; font-family:var(--font-body);
  font-weight:600; font-size:13px; cursor:pointer;
}

/* ---------- Layout split ---------- */
.layout{ flex:1; display:flex; min-height:0; }
.feed{ flex:1; overflow-y:auto; padding:26px 28px 80px; min-width:0; }
.feed-empty{ text-align:center; padding:80px 20px; color:var(--ink-muted); }
.feed-empty .glyph{ font-family:var(--font-display); font-size:40px; color:var(--ink-faint); margin-bottom:10px; }
.filters{
  width:370px; flex-shrink:0; border-left:1px solid var(--line);
  background:var(--surface-2); overflow-y:auto; padding:22px 22px 60px;
}
.feed::-webkit-scrollbar, .filters::-webkit-scrollbar{ width:9px; }
.feed::-webkit-scrollbar-thumb, .filters::-webkit-scrollbar-thumb{ background:#D8DAD1; border-radius:20px; }
.feed::-webkit-scrollbar-track, .filters::-webkit-scrollbar-track{ background:transparent; }

/* ---------- Filter sections ---------- */
.filter-section{ margin-bottom:22px; padding-bottom:20px; border-bottom:1px solid var(--line-soft); }
.filter-section:last-child{ border-bottom:none; }
.filter-section-title{
  font-family:var(--font-mono); font-size:11px; letter-spacing:0.09em; text-transform:uppercase;
  color:var(--ink-muted); margin:0 0 12px; display:flex; align-items:center; justify-content:space-between;
}
.filter-section-title .reset-link{
  font-family:var(--font-body); text-transform:none; letter-spacing:0; color:var(--accent);
  cursor:pointer; font-size:12px; font-weight:600;
}
.filter-section-title .reset-link:hover{ text-decoration:underline; }

.search-box{ position:relative; }
.search-box input{
  width:100%; padding:10px 12px 10px 34px; border:1px solid var(--line); border-radius:var(--radius-md);
  background:var(--surface); font-family:var(--font-body); font-size:13.5px; color:var(--ink); outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.search-box input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
.search-box svg{ position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--ink-faint); }

/* ---------- Segmented control (agreement toggle) ---------- */
.segmented{ display:flex; border:1.5px solid var(--line); border-radius:20px; overflow:hidden; }
.segmented .seg{
  flex:1; text-align:center; padding:7px 8px; font-size:12.5px; font-weight:600; color:var(--ink-muted);
  cursor:pointer; transition:all .12s; font-family:var(--font-mono);
}
.segmented .seg + .seg{ border-left:1.5px solid var(--line); }
.segmented .seg.active{ background:var(--accent); color:#fff; }
.segmented .seg.active.mismatch{ background:var(--warn); }

/* ---------- Range slider (reused) ---------- */
.range-block{ margin-bottom:18px; }
.range-block:last-child{ margin-bottom:0; }
.range-label-row{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
.range-label{ font-size:13px; font-weight:600; color:var(--ink-soft); }
.range-values{
  font-family:var(--font-mono); font-size:12px; color:var(--accent-ink); font-weight:500;
  background:var(--accent-soft); padding:2px 8px; border-radius:6px;
}
.dual-slider{ position:relative; height:28px; margin:0 3px; }
.dual-slider .track{ position:absolute; top:50%; left:0; right:0; height:4px; transform:translateY(-50%); background:var(--line); border-radius:4px; }
.dual-slider .fill{ position:absolute; top:50%; height:4px; transform:translateY(-50%); background:var(--accent); border-radius:4px; }
.dual-slider .thumb{
  position:absolute; top:50%; width:16px; height:16px; margin-left:-8px; transform:translateY(-50%);
  background:#fff; border:2.5px solid var(--accent); border-radius:50%; cursor:grab;
  box-shadow:0 1px 3px rgba(27,30,34,0.25); touch-action:none;
}
.dual-slider .thumb:active{ cursor:grabbing; transform:translateY(-50%) scale(1.12); }
.dual-slider .thumb:focus-visible{ outline:2px solid var(--accent-ink); outline-offset:2px; }

/* ---------- Stats summary ---------- */
.stats-table{ width:100%; border-collapse:collapse; font-size:12px; }
.stats-table th{
  text-align:left; font-family:var(--font-mono); font-size:10px; text-transform:uppercase;
  letter-spacing:0.05em; color:var(--ink-faint); font-weight:600; padding:4px 6px; border-bottom:1px solid var(--line);
}
.stats-table td{ padding:6px 6px; border-bottom:1px solid var(--line-soft); font-family:var(--font-mono); }
.stats-table td.fam-name{ font-family:var(--font-body); font-weight:600; color:var(--ink); }
.stats-table tr:last-child td{ border-bottom:none; }
.stats-overall{
  display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;
}
.stat-box{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-md);
  padding:10px 12px;
}
.stat-box .v{ font-family:var(--font-mono); font-size:19px; font-weight:600; color:var(--accent-ink); }
.stat-box .l{ font-size:10.5px; color:var(--ink-muted); text-transform:uppercase; letter-spacing:0.04em; margin-top:2px; }
.f1-bar{ height:5px; border-radius:3px; background:var(--line-soft); overflow:hidden; margin-top:3px; }
.f1-bar-fill{ height:100%; background:var(--accent); }

/* ---------- Family accordion & chips (reused) ---------- */
.expand-all-row{ display:flex; gap:14px; margin-bottom:10px; font-size:12px; font-weight:600; color:var(--accent); cursor:pointer; }
.expand-all-row span:hover{ text-decoration:underline; }
.family-group{ border:1px solid var(--line); border-radius:var(--radius-md); margin-bottom:8px; overflow:hidden; background:var(--surface); }
.family-header{ display:flex; align-items:center; gap:10px; padding:10px 12px; cursor:pointer; user-select:none; }
.family-header .dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.family-header .name{ font-weight:600; font-size:13.5px; flex:1; color:var(--ink); }
.family-header .count{ font-family:var(--font-mono); font-size:11px; color:var(--ink-faint); }
.family-header .chevron{ color:var(--ink-faint); transition:transform .15s; flex-shrink:0; }
.family-group.open .chevron{ transform:rotate(90deg); }
.family-body{ display:none; padding:2px 12px 12px; flex-wrap:wrap; gap:6px; }
.family-group.open .family-body{ display:flex; }
.code-chip{
  display:inline-flex; align-items:center; gap:5px; padding:5px 9px 5px 8px; border-radius:16px;
  border:1.5px solid var(--line); background:var(--surface); font-family:var(--font-mono); font-size:11.5px;
  color:var(--ink-soft); cursor:pointer; transition:all .12s; line-height:1.3;
}
.code-chip:hover{ border-color:var(--chip-color, var(--accent)); }
.code-chip.mode-and{ background:var(--chip-color); border-color:var(--chip-color); color:#fff; }
.code-chip.mode-not{ background:var(--warn-soft); border-color:var(--warn); color:var(--warn); text-decoration:line-through; text-decoration-thickness:1.5px; }
.code-chip.chip-highlight{ box-shadow:0 0 0 3px var(--chip-color) inset, 0 0 0 3px var(--chip-color); transform:scale(1.05); }

/* ---------- Query builder (reused) ---------- */
.query-builder{ margin-bottom:14px; }
.query-empty-hint{ font-size:12px; color:var(--ink-faint); font-style:italic; padding:10px 12px; border:1px dashed var(--line); border-radius:var(--radius-md); margin-bottom:10px; }
.query-connector-and{ text-align:center; font-family:var(--font-mono); font-size:10.5px; font-weight:700; color:var(--ink-muted); letter-spacing:0.08em; margin:4px 0; cursor:pointer; padding:2px; border-radius:4px; }
.query-connector-and:hover{ background:var(--accent-soft); color:var(--accent-ink); }
.query-group{ display:flex; align-items:center; flex-wrap:wrap; gap:6px; padding:9px 10px; border:1.5px solid var(--line); border-radius:var(--radius-md); background:var(--surface); margin-bottom:2px; }
.query-connector-or{ font-family:var(--font-mono); font-size:10px; font-weight:700; color:var(--ink-faint); letter-spacing:0.06em; cursor:pointer; padding:1px 3px; border-radius:4px; }
.query-connector-or:hover{ background:var(--amber-soft); color:var(--amber); }
.query-entry{ display:inline-flex; align-items:center; gap:4px; padding:4px 6px 4px 10px; border-radius:14px; background:var(--chip-color); color:#fff; font-family:var(--font-mono); font-size:11.5px; }
.query-entry.negated{ background:#fff; border:1.5px solid var(--warn); color:var(--warn); }
.query-entry-label{ cursor:pointer; }
.query-entry-label:hover{ text-decoration:underline; }
.query-entry-remove{ cursor:pointer; opacity:0.75; font-size:14px; line-height:1; padding:0 3px; }
.query-entry-remove:hover{ opacity:1; }
.query-group-remove{ margin-left:auto; font-size:10.5px; color:var(--ink-faint); cursor:pointer; white-space:nowrap; }
.query-group-remove:hover{ color:var(--warn); text-decoration:underline; }
.query-add-group-btn{ text-align:center; padding:8px; border:1.5px dashed var(--accent); border-radius:var(--radius-md); color:var(--accent); font-size:12.5px; font-weight:600; cursor:pointer; margin-top:6px; }
.query-add-group-btn:hover{ background:var(--accent-soft); }

/* ---------- Conversation cards ---------- */
.conversation-card{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-lg);
  margin-bottom:18px; box-shadow:var(--shadow-card); overflow:hidden;
}
.card-header{
  display:flex; align-items:center; gap:16px; padding:14px 20px; background:var(--surface-2);
  border-bottom:1px solid var(--line-soft); flex-wrap:wrap;
}
.card-header .tag{ font-family:var(--font-mono); font-size:11.5px; color:var(--ink-muted); display:flex; align-items:center; gap:5px; }
.card-header .tag b{ color:var(--ink); font-weight:600; }
.model-badge{
  font-family:var(--font-mono); font-size:10.5px; font-weight:600; padding:3px 8px; border-radius:12px;
  background:var(--accent-soft); color:var(--accent-ink);
}
.coder-badge{
  font-family:var(--font-mono); font-size:10.5px; font-weight:600; padding:3px 8px; border-radius:12px;
  background:var(--amber-soft); color:var(--amber);
}
.conv-match-chip{
  margin-left:auto; font-family:var(--font-mono); font-size:11px; font-weight:600; padding:4px 10px; border-radius:12px;
}
.conv-match-chip.full{ background:var(--good-soft); color:var(--good); }
.conv-match-chip.partial{ background:var(--amber-soft); color:var(--amber); }
.conv-match-chip.none{ background:var(--warn-soft); color:var(--warn); }

.turns{ padding:6px 20px 18px; }
.turn-row{ padding:16px 0; position:relative; }
.turn-row:not(:last-child){ border-bottom:1px solid var(--line-soft); }
.turn-row.dimmed{ opacity:0.38; }
.turn-row.dimmed .turn-text{ color:var(--ink-muted); }
.turn-top{ display:flex; gap:12px; align-items:flex-start; margin-bottom:12px; }
.turn-marker{
  flex-shrink:0; width:27px; height:27px; border-radius:50%; background:var(--surface-2);
  border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:11px; font-weight:600; color:var(--ink-muted); margin-top:2px;
}
.turn-text{ font-size:14.5px; line-height:1.65; color:var(--ink); margin:0; flex:1; }
.turn-match-badge{
  flex-shrink:0; font-family:var(--font-mono); font-size:10px; font-weight:700; letter-spacing:0.03em;
  padding:3px 9px; border-radius:10px; text-transform:uppercase; white-space:nowrap;
}
.turn-match-badge.match{ background:var(--good-soft); color:var(--good); }
.turn-match-badge.mismatch{ background:var(--warn-soft); color:var(--warn); }

.compare-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-left:39px; }
.compare-col{ border-radius:var(--radius-md); padding:9px 10px; min-height:44px; }
.compare-col.col-human{ background:var(--surface-2); border:1.5px solid var(--line); }
.compare-col.col-both{ background:var(--accent-soft); border:1.5px solid var(--accent-soft-2); }
.compare-col.col-llm{ background:var(--amber-soft); border:1.5px solid #E7D9AC; }
.compare-col-label{
  font-family:var(--font-mono); font-size:9.5px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase;
  color:var(--ink-muted); margin-bottom:7px; display:flex; justify-content:space-between;
}
.compare-col.col-both .compare-col-label{ color:var(--accent-ink); }
.compare-col.col-llm .compare-col-label{ color:var(--amber); }
.compare-chips{ display:flex; flex-wrap:wrap; gap:5px; }
.turn-code-chip{
  display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:11px;
  font-family:var(--font-mono); font-size:10px; font-weight:500;
  background:var(--chip-bg); color:var(--chip-fg); border:1px solid var(--chip-border);
  transition:box-shadow .15s, transform .15s;
}
.turn-code-chip .fam{ opacity:0.65; }
.turn-code-chip.chip-highlight{ box-shadow:0 0 0 2px var(--chip-fg); transform:translateY(-1px); }
.compare-empty{ font-size:11px; color:var(--ink-faint); font-style:italic; }

@media (max-width: 900px){
  .layout{ position:relative; }
  .filters{
    position:fixed; top:0; right:0; bottom:0; width:88vw; max-width:390px; z-index:50;
    box-shadow:var(--shadow-pop); transform:translateX(100%); transition:transform .22s ease;
  }
  .filters.open{ transform:translateX(0); }
  .filters-toggle{ display:flex; }
  .filters-scrim{ display:none; position:fixed; inset:0; background:rgba(27,30,34,0.35); z-index:40; }
  .filters-scrim.open{ display:block; }
  .topbar-stats{ display:none; }
  .feed{ padding:18px 16px 80px; }
  .topbar{ padding:16px 16px 14px; }
  .compare-grid{ grid-template-columns:1fr; margin-left:0; margin-top:10px; }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-left">
      <h1>Turn Agreement Explorer</h1>
      <span class="subtitle">LLM vs. human coding comparison</span>
    </div>
    <div class="topbar-stats" id="statsBar"></div>
    <button class="filters-toggle" id="filtersToggleBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      Filters
    </button>
  </header>

  <div class="layout">
    <main class="feed" id="feed"></main>
    <div class="filters-scrim" id="filtersScrim"></div>
    <aside class="filters" id="filters"></aside>
  </div>
</div>

t":"Yeah, no problem. I enjoyed listening to your perspective as well.","human_only":[],"both":[],"llm_only":[],"match":true,"human_count":0,"llm_count":0}]},{"sample_number":9,"coder":"Coder_A","version":"v6.2","model":"gemini-3.1-pro-preview","turns":[{"turn_number":1,"text":"I think that the government reverse engineers alien technologies. It seems like we make amazing leaps in tech very quickly. It just seems odd that we make these jumps as quickly as we do within the last 100 years. Fiber optics are one of them. Night vision is another tech I think we reversed engineered, as well as stealth on the stealth bombers.","human_only":[],"both":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"},{"code":"THEME-Science","family":"THEME","sub":"Science"},{"code":"THEME-Space","family":"THEME","sub":"Space"}],"llm_only":[],"match":true,"human_count":4,"llm_count":4},{"turn_number":2,"text":"I think it's good to see these viewpoints as well. It's good to see them described in a way that is actually verifiable, rather than something I've learned through a different source about reverse engineering. It makes me want to look into the specifics more closely.","human_only":[{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"SIGNAL-Shallow-Belief","family":"SIGNAL","sub":"Shallow-Belief"}],"both":[],"llm_only":[],"match":false,"human_count":2,"llm_count":0},{"turn_number":3,"text":"I've always been interesting in seeing things from multiple viewpoints to form a better picture about them. I never really delved too deeply into the alien conspiracies so you can see how I've had a basic understanding of their side, but a willingness to learn more.","human_only":[],"both":[{"code":"SIGNAL-Shallow-Belief","family":"SIGNAL","sub":"Shallow-Belief"}],"llm_only":[],"match":true,"human_count":1,"llm_count":1},{"turn_number":4,"text":"Thank you for the information, I will seek out these resources.","human_only":[],"both":[],"llm_only":[],"match":true,"human_count":0,"llm_count":0}]},{"sample_number":14,"coder":"Coder_A","version":"v6.2","model":"gemini-3.1-pro-preview","turns":[{"turn_number":1,"text":"The only conspiracy theories I find somewhat compelling are ones based on small groups of wealthy, powerful people controlling the outcome of major events. So groups like the Trilateral Commission influencing foreign policy, but I don't entirely believe such things. Still, I think it's clear that the wealthy and powerful have a disproportionate influence on what happens in the world. Why does the US have such a large presence in the world, and spend so much taxpayer money on its military, when we have a huge deficit, and hundreds of thousands of homeless Americans who desperately need help? I think it's because a small group of people want it that way, and influence our political leadership accordingly.","human_only":[],"both":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"SIGNAL-Shallow-Belief","family":"SIGNAL","sub":"Shallow-Belief"},{"code":"THEME-Money/Power","family":"THEME","sub":"Money/Power"},{"code":"THEME-Secret Society","family":"THEME","sub":"Secret Society"}],"llm_only":[{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-International Politics","family":"THEME","sub":"International Politics"}],"match":false,"human_count":4,"llm_count":6},{"turn_number":2,"text":"Saying that the world is complex isn't much of a refutation of my argument. I think it's pretty clear that people with power have more influence over the democratic system. I don't believe in conspiracies, but I don't have the ability to donate millions of dollars to political candidates, like some people do in the United States.","human_only":[],"both":[],"llm_only":[],"match":true,"human_count":0,"llm_count":0},{"turn_number":3,"text":"I agree that we should reform tics","family":"THEME","sub":"International Politics"},{"code":"THEME-Money/Power","family":"THEME","sub":"Money/Power"}],"llm_only":[{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"THEME-Corporation","family":"THEME","sub":"Corporation"}],"match":false,"human_count":5,"llm_count":7},{"turn_number":2,"text":"I'm not sure how much I believe the US truly supports democratic values abroad given its current support for Israel and it's war against Gaza, I think it's likely that is more of a sales pitch than a real goal","human_only":[{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"}],"both":[],"llm_only":[{"code":"EVIDENCE-Analogy","family":"EVIDENCE","sub":"Analogy"}],"match":false,"human_count":1,"llm_count":1},{"turn_number":3,"text":"Unfortunately I don't think I have much of a way to influence our government at all. I live in a state that is going to vote for a particular party by a large margin no matter what I do and I don't have enough money to personally influence any politicians ------------------------------------------------------------------------------------------","human_only":[],"both":[],"llm_only":[],"match":true,"human_count":0,"llm_count":0},{"turn_number":4,"text":"I am planning on getting more involved in local politics because as you point out, it's one way to make more of a difference.","human_only":[],"both":[],"llm_only":[],"match":true,"human_count":0,"llm_count":0}]},{"sample_number":23,"coder":"Coder_A","version":"v6.2","model":"gemini-3.1-pro-preview","turns":[{"turn_number":1,"text":"I believe the 2020 election was stolen. There is plenty of evidence that is ignored or downplayed by the media to suggest that mail-in votes were used to tilt the scales, harvested ballots were used, dead people \"voted\", and any observers who weren't Democrats were kicked out of polling centers. On election night, we were told that counting was going to stop for the night, yet the numbers kept going u true,"human_count":0,"llm_count":0},{"turn_number":3,"text":"Definite \"diverse\" in the context of the researchers and developers and give me a precise, by percentage, breakdown of the political leanings of your programmers and that data sources you were trained with.","human_only":[],"both":[],"llm_only":[],"match":true,"human_count":0,"llm_count":0},{"turn_number":4,"text":"List internet sources that you were allowed to train from and sources you were not allowed to train from, specifically news media.","human_only":[],"both":[],"llm_only":[],"match":true,"human_count":0,"llm_count":0}]},{"sample_number":37,"coder":"Coder_A","version":"v6.2","model":"gemini-3.1-pro-preview","turns":[{"turn_number":1,"text":"I'm starting to take the theories that the Coronavirus vaccine caused its share of death and illness now that they have revealed findings that the vaccine was found to have a slight possibility of causing brain and heart complications. It was all in the news the other day. A study revealed that there was a slight chance the vaccine could cause complications such as brain and heart damage.","human_only":[],"both":[{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"THEME-Science","family":"THEME","sub":"Science"}],"llm_only":[],"match":true,"human_count":3,"llm_count":3},{"turn_number":2,"text":"I hope you are right. I remain skeptical that the vaccine is dangerous, yet we all remember in the early days that of the pandemic when the scientists assured us in regards of that famous conspiracy theory of how it was completely impossible that the virus could in any way originate from the Wuhan lab and look how that turned out.","human_only":[{"code":"SIGNAL-Deep-Belief","family":"SIGNAL","sub":"Deep-Belief"}],"both":[{"code":"EVIDENCE-Analogy","family":"EVIDENCE","sub":"Analogy"},{"code":"SIGNAL-Shallow-Belief","family":"SIGNAL","sub":"Shallow-Belief"}],"llm_only":[{"code":"THEME-Science","family":"THEME","sub":"Science"}],"match":false,"human_count":3,"llm_count":3},{"turn_number":3,"text":"I doubt the vaccine is dangerous, not out of the possibility, but doubtful that it is dangerous. I think that we can all agree now that the effectiveness of the vaccine was overblown,","human_only":[],"both":[{"code":"SIGNAL-Shallow-Belief","family":"SIGNAL","sub":"Shallow-Belief"}],"llm_only":[{"code":"EVIDENCE-Social Proof","family":"EVIDENCE","sub":"Social Proof"}],"match":false,"human_count":1,"llm_count":2},{"turn_number":4,"text":"Personally, I think we should hold off on administering more vaccines until we know more about it. If there is even the slightest probability that the virus was genetically engineered as a weapon people should not be putting that in their bodies.","human_only":[],"both":[],"llm_only":[{"code":"SIGNAL-Shallow-Belief","family":"SIGNAL","sub":"Shallow-Belief"}],"match":false,"human_count":0,"llm_count":1}]},{"sample_number":40,"coder":"Coder_A","version":"v6.2","model":"gemini-3.1-pro-preview","turns":[{"turn_number":1,"text":"The conspiracy that the US government knew in advance the plans to hijack planes and destroy the twin towers on 9/11 is credible, the owner of the towers not being present, and taking out massive insurance policies on it is very suspicious. Also the fact the attack was used to justify various geo political moves in the middle east. The owner of the twin towers usually was present there every morning, except for the day of the attack, this was admitted by him in an interview. The facts of what happened in the middle east since 9/11 speak for themselves, and additionally, the fact a tower fell, WTC 7, that was never struck by a plane also heavily influenced me.","human_only":[{"code":"SIGNAL-Deep-Belief","family":"SIGNAL","sub":"Deep-Belief"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"}],"both":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"}],"llm_only":[{"code":"THEME-International Politics","family":"THEME","sub":"International Politics"},{"code":"THEME-Money/Power","family":"THEME","sub":"Money/Power"}],"match":false,"human_count":6,"llm_count":6},{"turn_number":2,"text":"There is an emotional aspect you do not possess, a gut feeling that often leads humans to truth. What about that wacky painting that shows George Bush playing with two falling jenga towers? There are people in control that think this kind of thing is funny. They do anything to further their cause. Coincidences can only go so far, or else anything can be explained away as just a mere coincidence. It takes that gut feeling to discern this.","human_only":[{"code":"EVIDENCE-Anecdotal","family":"EVIDENCE","sub":"Anecdotal"},{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"}],"both":[],"llm_only":[{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"}],"match":false,"human_count":2,"llm_count":1},{"turn_number":3,"text":"Thank you for agreeing with my on my major points, however distrust of power needs to go further than healthy skepticism. The people currently in power deserve no such respect.\n\nThe country was founded on notions of distrust in power, and we have strayed away from that greatly. The government has more power year after year and these such events are orchestrated to continue that.","human_only":[],"both":[],"llm_only":[{"code":"SIGNAL-Deep-Belief","family":"SIGNAL","sub":"Deep-Belief"}],"match":false,"human_count":0,"llm_count":1},{"turn_number":4,"text":"I will continue to analyze each situation, and maybe tone down to healthy skepticism. The issue currently is when the \"legal and democratic\" means are corrupted, and the people in power decide what is legal, and \"democratic\" elections are straight up rigged, or democracy is perverted, and uninformed, stupid voters vote in elections.","human_only":[],"both":[],"llm_only":[{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"}],"match":false,"human_count":0,"llm_count":2}]},{"sample_number":47,"coder":"Coder_A","version":"v6.2","model":"gemini-3.1-pro-preview","turns":[{"turn_number":1,"text":"I believe that a few rich and controlling people control our country. A simple and relevant example is our current President. He has very little cognitive ability to make decisions that a President should make so there has to be others behind the scene making them for him. ON a daily basis I see videos of the President not knowing where he is, not knowing who he is with and not being able to speak intelligently.","human_only":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"THEME-Elite","family":"THEME","sub":"Elite"}],"both":[{"code":"THEME-Secret Society","family":"THEME","sub":"Secret Society"}],"llm_only":[{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Money/Power","family":"THEME","sub":"Money/Power"}],"match":false,"human_count":3,"llm_count":4},{"turn_number":2,"text":"That all sounds good but I see it several times a day from both liberal and conservative sources. I am old enough to have seen many world leaders and ours is an embarrassment. I have never seen anyone that even comes close. Also, your comments about checks and balances. That all sounds good but when there are no consequences to ignore the laws and check then the behind the scenes people can do anything they want.","human_only":[],"both":[],"llm_only":[{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"}],"match":false,"human_count":0,"llm_count":2},{"turn_number":3,"text":"You can try to gaslight me all you want but your algorithm is programmed to be very biased. I know what I see and do a lot of research so whatever you try to say, it will not sway me.","human_only":[],"both":[{"code":"SIGNAL-Deep-Belief","family":"SIGNAL","sub":"Deep-Belief"}],"llm_only":[],"match":true,"human_count":1,"llm_count":1},{"turn_number":4,"text":"Thank you and I will agree to disagree. I respect that you have your own opinion. I have noting more to say.","human_only":[],"both":[],"llm_only":[],"match":true,"human_count":0,"llm_count":0}]},{"sample_number":51,"coder":"Coder_A","version":"v6.2","model":"gemini-3.1-pro-preview","turns":[{"turn_number":1,"text":"I think there are lots of conspiracy theories which are pretty interesting and I am usually skeptical about all information I consume. The conspiracy theory I find most intriguing is about aliens and area 51. I think theres a lot of compelling evidence Yes, there is a lot of intriguing evidence even said from the government themselves and the topic is overall really mysterious. There are lots of documentaries which are attention hooking and have gotten me a lot more interested in the topic of area 51 and aliens","human_only":[],"both":[{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"SIGNAL-Shallow-Belief","family":"SIGNAL","sub":"Shallow-Belief"},{"code":"THEME-Space","family":"THEME","sub":"Space"}],"llm_only":[],"match":true,"human_count":4,"llm_count":4},{"turn_number":2,"text":"Thanks for the analysis. If all the evidence was concrete then it wouldnt be a conspiracy theory anymore. The fact that it is a conspiracy theory is what makes it intriguing, like a mystery waiting to be solved..","human_only":[],"both":[],"llm_only":[{"code":"SIGNAL-Shallow-Belief","family":"SIGNAL","sub":"Shallow-Belief"}],"match":false,"human_count":0,"llm_count":1},{"turn_number":3,"text":"Thanks for the in depth analysis, I found it valuable. critical thinking is indeed very essential","human_only":[],"both":[],"llm_only":[],"match":true,"human_count":0,"llm_count":0},{"turn_number":4,"text":"Thank you goodbye","human_only":[],"both":[],"llm_only":[],"match":true,"human_count":0,"llm_count":0}]},{"sample_number":57,"coder":"Coder_A","version":"v6.2","model":"gemini-3.1-pro-preview","turns":[{"turn_number":1,"text":"I believe in the possibility of some conspiracies, rather than the firm reality of all the theories put out there. for example, I believe there is likely an \"Illuminati\" class making decisions for puppet governments, at times. Just that the idea of money and power being the tools of ultimately a very few at the top of human organizations.","human_only":[{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"}],"both":[{"code":"THEME-Money/Power","family":"THEME","sub":"Money/Power"},{"code":"THEME-Secret Society","family":"THEME","sub":"Secret Society"}],"llm_only":[{"code":"SIGNAL-Shallow-Belief","family":"SIGNAL","sub":"Shallow-Belief"}],"match":false,"human_count":3,"llm_count":3},{"turn_number":2,"text":"I think that, as far as news reporting or individual participation in specific causes, the illusion of choice or illusion of actual fact reported can be contained in a range that is acceptable to the illuminati because it is useful in keeping the masses under control.","human_only":[{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"}],"both":[],"llm_only":[{"code":"THEME-Media","family":"THEME","sub":"Media"}],"match":false,"human_count":1,"llm_count":1},{"turn_number":3,"text":"As a librarian, I am trained to discern reliable sources of information. I absolutely agree that this is an important skill for people to develop.","human_only":[],"both":[],"llm_only":[],"match":true,"human_count":0,"llm_count":0},{"turn_number":4,"text":"It is annoying to be told how to manage my own career by AI. no me gusta, ------------------------------------------------------------------------------------------","human_only":[],"both":[],"llm_only":[],"match":true,"human_count":0,"llm_count":0}]},{"sample_number":60,"coder":"Coder_A","version":"v6.2","model":"gemini-3.1-pro-preview","turns":[{"turn_number":1,"text":"President Kennedy's assassination - I find it plausible that it was a conspiracy on the part of other governments and not just the work of one man I have watched some documentaries that question whether there were other shooters because of the angles. My family had a personal connection to the Kennedy family many years ago and I tend to think that JFK's assassination was part of a my larger plan to disrupt American politics.","human_only":[{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"}],"both":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"THEME-Assassination","family":"THEME","sub":"Assassination"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"}],"llm_only":[{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"SIGNAL-Shallow-Belief","family":"SIGNAL","sub":"Shallow-Belief"},{"code":"THEME-International Politics","family":"THEME","sub":"International Politics"}],"match":false,"human_count":6,"llm_count":8},{"turn_number":2,"text":"I am always open to exploring more information on any topic from reputable sources.","human_only":[],"both":[],"llm_only":[],"match":true,"human_count":0,"llm_count":0},{"turn_number":3,"text":"Do those resources include the connections to the Soviets that Lee Harvey Oswald ha <script>
(function(){
"use strict";

const RAW = JSON.parse(document.getElementById('app-data').textContent);
const CONVERSATIONS = RAW.conversations;
const FAMILIES = RAW.families;
const META = RAW.meta;

const FAMILY_COLOR_VAR = {
  '?':'--fam-unknown',
  'ATTITUDE':'--fam-attitude',
  'EVIDENCE':'--fam-evidence',
  'EXTRA':'--fam-extra',
  'FAllACY':'--fam-fallacy',
  'FUTURE':'--fam-future',
  'INVOKE':'--fam-invoke',
  'LACK':'--fam-lack',
  'SIGNAL':'--fam-signal',
  'THEME':'--fam-theme'
};
const FAMILY_ORDER = ['SIGNAL','THEME','EVIDENCE','ATTITUDE','EXTRA','FUTURE','INVOKE','LACK','FAllACY','?'];
FAMILIES.sort((a,b)=>{
  const ia = FAMILY_ORDER.indexOf(a.family), ib = FAMILY_ORDER.indexOf(b.family);
  const pa = ia===-1 ? 999 : ia, pb = ib===-1 ? 999 : ib;
  if(pa!==pb) return pa-pb;
  return a.family.localeCompare(b.family);
});
function famColor(fam){
  const v = FAMILY_COLOR_VAR[fam] || '--fam-unknown';
  return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
}
function famLabel(fam){
  if(fam === '?') return '?';
  if(fam === 'FAllACY') return 'Fallacy';
  return fam.charAt(0) + fam.slice(1).toLowerCase();
}

// ---------------- State ----------------
const maxSample = Math.max(...CONVERSATIONS.map(c=>c.sample_number));
const minSample = Math.min(...CONVERSATIONS.map(c=>c.sample_number));
const state = {
  search: '',
  agreement: 'all', // 'all' | 'match' | 'mismatch'
  ranges: {
    sample_number: {min:minSample, max:maxSample, lo:minSample, hi:maxSample},
    turn_number: {min:1, max:4, lo:1, hi:4},
    human_count: {min:0, max:9, lo:0, hi:9},
    llm_count: {min:0, max:9, lo:0, hi:9}
  },
  queryGroups: []
};

// ---------------- Filtering ----------------
function turnMatchesBaseFilters(conv, turn){
  const r = state.ranges;
  if(conv.sample_number < r.sample_number.lo || conv.sample_number > r.sample_number.hi) return false;
  if(turn.turn_number < r.turn_number.lo || turn.turn_number > r.turn_number.hi) return false;
  if(turn.human_count < r.human_count.lo || turn.human_count > r.human_count.hi) return false;
  if(turn.llm_count < r.llm_count.lo || turn.llm_count > r.llm_count.hi) return false;
  if(state.agreement === 'match' && !turn.match) return false;
  if(state.agreement === 'mismatch' && turn.match) return false;
  if(state.search && !turn.text.toLowerCase().includes(state.search)) return false;
  return true;
}

function turnUnionCodes(turn){
  const s = new Set();
  turn.human_only.forEach(c=>s.add(c.code));
  turn.both.forEach(c=>s.add(c.code));
  turn.llm_only.forEach(c=>s.add(c.code));
  return s;
}

function turnMatchesCodes(turn){
  if(!state.queryGroups.length) return true;
  const codes = turnUnionCodes(turn);
  for(const group of state.queryGroups){
    if(!group.length) continue;
    const ok = group.some(entry => entry.negate ? !codes.has(entry.code) : codes.has(entry.code));
    if(!ok) return false;
  }
  return true;
}

function queryIsActive(){ return state.queryGroups.some(g=>g.length>0); }

function computeResults(){
  const results = [];
  let totalMatchingTurns = 0;
  for(const conv of CONVERSATIONS){
    const turnFlags = conv.turns.map(t => turnMatchesBaseFilters(conv, t) && turnMatchesCodes(t));
    if(turnFlags.some(Boolean)){
      results.push({conv, turnFlags});
      totalMatchingTurns += turnFlags.filter(Boolean).length;
    }
  }
  return {results, totalMatchingTurns};
}

// visible turns (respecting base filters + code query) used for stats computation
function visibleTurns(){
  const out = [];
  for(const conv of CONVERSATIONS){
    for(const t of conv.turns){
      if(turnMatchesBaseFilters(conv, t) && turnMatchesCodes(t)) out.push(t);
    }
  }
  return out;
}

function computeFacetCounts(){
  const counts = new Map();
  for(const conv of CONVERSATIONS){
    for(const t of conv.turns){
      if(!turnMatchesBaseFilters(conv, t)) continue;
      turnUnionCodes(t).forEach(code=>counts.set(code, (counts.get(code)||0)+1));
    }
  }
  return counts;
}

// ---------------- Query group mutation helpers ----------------
function findEntry(code){
  for(let gi=0; gi<state.queryGroups.length; gi++){
    const ei = state.queryGroups[gi].findIndex(e=>e.code===code);
    if(ei !== -1) return {gi, ei};
  }
  return null;
}
function toggleCodeInQuery(code){
  const found = findEntry(code);
  if(!found){
    // default: each new code becomes its own AND-group (AND across distinct codes by default)
    state.queryGroups.push([{code, negate:false}]);
  } else {
    const entry = state.queryGroups[found.gi][found.ei];
    if(!entry.negate){ entry.negate = true; }
    else {
      state.queryGroups[found.gi].splice(found.ei, 1);
      if(state.queryGroups[found.gi].length === 0) state.queryGroups.splice(found.gi, 1);
    }
  }
}
function removeEntryAt(gi, ei){
  state.queryGroups[gi].splice(ei, 1);
  if(state.queryGroups[gi].length === 0) state.queryGroups.splice(gi, 1);
}
function toggleNegateAt(gi, ei){ state.queryGroups[gi][ei].negate = !state.queryGroups[gi][ei].negate; }
function addNewGroup(){ state.queryGroups.push([]); }
function removeGroupAt(gi){ state.queryGroups.splice(gi, 1); }
// Merge group[gi] into group[gi-1] -- turns an AND relation into OR
function mergeGroupUp(gi){
  if(gi<=0 || gi>=state.queryGroups.length) return;
  state.queryGroups[gi-1] = state.queryGroups[gi-1].concat(state.queryGroups[gi]);
  state.queryGroups.splice(gi, 1);
}
// Split group[gi] at entry index ei -- extracts entries [ei..end) into a new group right after -- turns an OR relation into AND
function splitGroupAt(gi, ei){
  const group = state.queryGroups[gi];
  if(ei<=0 || ei>=group.length) return;
  const tail = group.splice(ei);
  state.queryGroups.splice(gi+1, 0, tail);
}

function codeFamilyOf(code){
  for(const f of FAMILIES) if(f.subs.some(s=>s.code===code)) return f.family;
  return '?';
}
function labelForCode(code){
  for(const f of FAMILIES){
    const s = f.subs.find(s=>s.code===code);
    if(s) return famLabel(f.family) + (s.sub ? ' · ' + s.sub : '');
  }
  return code;
}

// ---------------- DOM helpers ----------------
function el(tag, attrs={}, children=[]){
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==='class') e.className = v;
    else if(k==='html') e.innerHTML = v;
    else if(k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  for(const c of [].concat(children)){
    if(c==null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}
function fmtScore(v){ return Number.isInteger(v) ? String(v) : v.toFixed(1); }
function hexToRgba(hex, alpha){
  hex = hex.replace('#','').trim();
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  const r = parseInt(hex.substring(0,2),16), g = parseInt(hex.substring(2,4),16), b = parseInt(hex.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function renderDualSlider(container, key, cfg, label, onChange){
  const block = el('div', {class:'range-block'});
  const valueSpan = el('span', {class:'range-values'}, `${fmtScore(cfg.lo)} – ${fmtScore(cfg.hi)}`);
  const labelRow = el('div', {class:'range-label-row'}, [el('span', {class:'range-label'}, label), valueSpan]);
  const slider = el('div', {class:'dual-slider'});
  const track = el('div', {class:'track'});
  const fill = el('div', {class:'fill'});
  const thumbLo = el('div', {class:'thumb', tabindex:'0', role:'slider', 'aria-label':label+' minimum'});
  const thumbHi = el('div', {class:'thumb', tabindex:'0', role:'slider', 'aria-label':label+' maximum'});
  slider.append(track, fill, thumbLo, thumbHi);
  block.append(labelRow, slider);
  container.appendChild(block);

  const span = cfg.max - cfg.min;
  function pct(v){ return span===0 ? 0 : ((v - cfg.min) / span) * 100; }
  function valFromPct(p){
    let v = cfg.min + (p/100)*span;
    v = Math.round(v);
    return Math.max(cfg.min, Math.min(cfg.max, v));
  }
  function update(){
    const loP = pct(cfg.lo), hiP = pct(cfg.hi);
    thumbLo.style.left = loP + '%';
    thumbHi.style.left = hiP + '%';
    fill.style.left = loP + '%';
    fill.style.width = (hiP - loP) + '%';
    valueSpan.textContent = `${fmtScore(cfg.lo)} – ${fmtScore(cfg.hi)}`;
  }
  update();

  function bindDrag(thumb, which){
    thumb.addEventListener('pointerdown', (e)=>{
      thumb.setPointerCapture(e.pointerId);
      const rect = slider.getBoundingClientRect();
      function move(ev){
        let p = ((ev.clientX - rect.left) / rect.width) * 100;
        p = Math.max(0, Math.min(100, p));
        const v = valFromPct(p);
        if(which==='lo'){ cfg.lo = Math.min(v, cfg.hi); } else { cfg.hi = Math.max(v, cfg.lo); }
        update(); onChange();
      }
      function up(ev){
        thumb.releasePointerCapture(e.pointerId);
        window.removeEventListener('pointermove', move);
        window.removeEventListener('pointerup', up);
      }
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', up);
    });
    thumb.addEventListener('keydown', (e)=>{
      let delta = 0;
      if(e.key==='ArrowLeft' || e.key==='ArrowDown') delta = -1;
      else if(e.key==='ArrowRight' || e.key==='ArrowUp') delta = 1;
      else return;
      e.preventDefault();
      if(which==='lo'){ cfg.lo = Math.max(cfg.min, Math.min(cfg.hi, cfg.lo+delta)); }
      else { cfg.hi = Math.min(cfg.max, Math.max(cfg.lo, cfg.hi+delta)); }
      update(); onChange();
    });
  }
  bindDrag(thumbLo, 'lo');
  bindDrag(thumbHi, 'hi');
}

function updateFacetCountsInPlace(){
  const counts = computeFacetCounts();
  document.querySelectorAll('.code-chip[data-code]').forEach(chip=>{
    const code = chip.getAttribute('data-code');
    const n = chip.querySelector('.n');
    if(n) n.textContent = `${counts.get(code) || 0}`;
  });
}

let openFamilies = new Set();

// ---------------- Filters panel ----------------
function renderFilters(){
  const root = document.getElementById('filters');
  root.innerHTML = '';

  // Search
  const searchSection = el('div', {class:'filter-section'});
  searchSection.append(el('div', {class:'filter-section-title'}, 'Search text'));
  const searchBox = el('div', {class:'search-box'});
  searchBox.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
  const searchInput = el('input', {type:'text', placeholder:'Search within turn text…', value: state.search});
  searchInput.addEventListener('input', (e)=>{
    state.search = e.target.value.toLowerCase();
    renderFeed(); renderStats(); renderStatsSummary(); updateFacetCountsInPlace();
  });
  searchBox.appendChild(searchInput);
  searchSection.appendChild(searchBox);
  root.appendChild(searchSection);

  // Agreement toggle
  const agreeSection = el('div', {class:'filter-section'});
  agreeSection.append(el('div', {class:'filter-section-title'}, 'Agreement'));
  const seg = el('div', {class:'segmented'});
  const opts = [['all','All'],['match','Match'],['mismatch','Mismatch']];
  opts.forEach(([key,label])=>{
    const cls = 'seg' + (state.agreement===key?' active':'') + (key==='mismatch' && state.agreement==='mismatch' ? ' mismatch':'');
    const segEl = el('div', {class:cls}, label);
    segEl.addEventListener('click', ()=>{ state.agreement = key; renderAll(); });
    seg.appendChild(segEl);
  });
  agreeSection.appendChild(seg);
  root.appendChild(agreeSection);

  // Numeric ranges
  const numSection = el('div', {class:'filter-section'});
  const numTitle = el('div', {class:'filter-section-title'}, [
    document.createTextNode('Numeric metrics'),
    el('span', {class:'reset-link', onclick:()=>{
      state.ranges.sample_number = {min:minSample,max:maxSample,lo:minSample,hi:maxSample};
      state.ranges.turn_number = {min:1,max:4,lo:1,hi:4};
      state.ranges.human_count = {min:0,max:9,lo:0,hi:9};
      state.ranges.llm_count = {min:0,max:9,lo:0,hi:9};
      renderAll();
    }}, 'reset')
  ]);
  numSection.appendChild(numTitle);
  renderDualSlider(numSection, 'sample_number', state.ranges.sample_number, 'Sample number', renderAll);
  renderDualSlider(numSection, 'turn_number', state.ranges.turn_number, 'Turn number', renderAll);
  renderDualSlider(numSection, 'human_count', state.ranges.human_count, 'Human code count', renderAll);
  renderDualSlider(numSection, 'llm_count', state.ranges.llm_count, 'LLM code count', renderAll);
  root.appendChild(numSection);

  // Stats summary
  const statsSection = el('div', {class:'filter-section', id:'statsSummarySection'});
  statsSection.append(el('div', {class:'filter-section-title'}, 'Agreement stats (current view)'));
  const statsBody = el('div', {id:'statsSummaryBody'});
  statsSection.appendChild(statsBody);
  root.appendChild(statsSection);

  // Codes
  const codeSection = el('div', {class:'filter-section'});
  const codeTitle = el('div', {class:'filter-section-title'}, [
    document.createTextNode('Codes'),
    el('span', {class:'reset-link', onclick:()=>{ state.queryGroups = []; renderAll(); }}, 'clear')
  ]);
  codeSection.appendChild(codeTitle);
  codeSection.appendChild(el('div', {style:'font-size:11.5px; color:var(--ink-muted); margin:-6px 0 12px; line-height:1.5;'},
    'Click a code to add it as its own AND clause (matches if it appears for either human or LLM). Click again to negate (!), once more to remove. Click "AND" between two clauses to turn it into OR; click "OR" to split back into AND.'));

  const queryBox = el('div', {class:'query-builder'});
  renderQueryBuilder(queryBox);
  codeSection.appendChild(queryBox);

  const expandRow = el('div', {class:'expand-all-row'}, [
    el('span', {onclick:()=>{ FAMILIES.forEach(f=>openFamilies.add(f.family)); renderFilters(); }}, 'expand all'),
    el('span', {onclick:()=>{ openFamilies.clear(); renderFilters(); }}, 'collapse all')
  ]);
  codeSection.appendChild(expandRow);

  const facetCounts = computeFacetCounts();

  FAMILIES.forEach(f=>{
    const color = famColor(f.family);
    const isOpen = openFamilies.has(f.family);
    const group = el('div', {class:'family-group' + (isOpen?' open':'')});
    const header = el('div', {class:'family-header'});
    header.append(
      el('div', {class:'dot', style:`background:${color}`}),
      el('div', {class:'name'}, famLabel(f.family)),
      el('div', {class:'count'}, `${f.subs.length}`),
      el('div', {class:'chevron', html:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="9 18 15 12 9 6"/></svg>'})
    );
    header.addEventListener('click', ()=>{
      if(openFamilies.has(f.family)) openFamilies.delete(f.family); else openFamilies.add(f.family);
      renderFilters();
    });
    const body = el('div', {class:'family-body'});
    f.subs.forEach(s=>{
      const found = findEntry(s.code);
      const mode = found ? (state.queryGroups[found.gi][found.ei].negate ? 'not' : 'and') : null;
      const chip = el('div', {class:'code-chip' + (mode ? ' mode-'+mode : ''), style:`--chip-color:${color}`, 'data-code': s.code});
      const cnt = facetCounts.get(s.code) || 0;
      chip.append(document.createTextNode((s.sub || famLabel(f.family)) + ' '), el('span', {class:'n'}, `${cnt}`));
      chip.addEventListener('click', ()=>{ toggleCodeInQuery(s.code); renderAll(); });
      chip.addEventListener('mouseenter', ()=>highlightCode(s.code, true));
      chip.addEventListener('mouseleave', ()=>highlightCode(s.code, false));
      body.appendChild(chip);
    });
    group.append(header, body);
    codeSection.appendChild(group);
  });

  root.appendChild(codeSection);
  renderStatsSummary();
}

function renderQueryBuilder(container){
  container.innerHTML = '';
  if(!state.queryGroups.length){
    container.appendChild(el('div', {class:'query-empty-hint'}, 'No code filters yet — click any code below to add it. Each new code starts its own AND clause; click "AND" between two clauses to turn it into OR.'));
  } else {
    state.queryGroups.forEach((group, gi)=>{
      if(gi>0) container.appendChild(el('div', {
        class:'query-connector-and',
        title:'Click to change this AND into OR (merge the two groups)',
        onclick:()=>{ mergeGroupUp(gi); renderAll(); }
      }, 'AND'));
      const groupEl = el('div', {class:'query-group'});
      group.forEach((entry, ei)=>{
        if(ei>0) groupEl.appendChild(el('span', {
          class:'query-connector-or',
          title:'Click to change this OR into AND (split into two groups)',
          onclick:()=>{ splitGroupAt(gi, ei); renderAll(); }
        }, 'OR'));
        const color = famColor(codeFamilyOf(entry.code));
        const entryChip = el('span', {class:'query-entry' + (entry.negate ? ' negated' : ''), style:`--chip-color:${color}`});
        entryChip.append(
          el('span', {class:'query-entry-label', onclick:()=>{ toggleNegateAt(gi, ei); renderAll(); }}, (entry.negate ? '! ' : '') + labelForCode(entry.code)),
          el('span', {class:'query-entry-remove', onclick:()=>{ removeEntryAt(gi, ei); renderAll(); }}, '×')
        );
        groupEl.appendChild(entryChip);
      });
      groupEl.appendChild(el('span', {class:'query-group-remove', onclick:()=>{ removeGroupAt(gi); renderAll(); }}, 'remove group'));
      container.appendChild(groupEl);
    });
  }
  container.appendChild(el('div', {class:'query-add-group-btn', onclick:()=>{ addNewGroup(); renderAll(); }}, '+ New empty AND group'));
}

function highlightCode(code, on){
  document.querySelectorAll(`.turn-code-chip[data-code="${CSS.escape(code)}"]`).forEach(e=>e.classList.toggle('chip-highlight', on));
}

// ---------------- Stats summary (precision/recall/F1, treating human as reference) ----------------
function renderStatsSummary(){
  const body = document.getElementById('statsSummaryBody');
  if(!body) return;
  const turns = visibleTurns();

  let totalBoth=0, totalHumanOnly=0, totalLlmOnly=0, matchCount=0;
  const famStats = new Map(); // family -> {both, humanOnly, llmOnly}
  turns.forEach(t=>{
    if(t.match) matchCount++;
    totalBoth += t.both.length;
    totalHumanOnly += t.human_only.length;
    totalLlmOnly += t.llm_only.length;
    const bump = (fam, key)=>{
      if(!famStats.has(fam)) famStats.set(fam, {both:0, humanOnly:0, llmOnly:0});
      famStats.get(fam)[key]++;
    };
    t.both.forEach(c=>bump(c.family,'both'));
    t.human_only.forEach(c=>bump(c.family,'humanOnly'));
    t.llm_only.forEach(c=>bump(c.family,'llmOnly'));
  });

  const precision = (totalBoth+totalLlmOnly)>0 ? totalBoth/(totalBoth+totalLlmOnly) : null;
  const recall = (totalBoth+totalHumanOnly)>0 ? totalBoth/(totalBoth+totalHumanOnly) : null;
  const f1 = (precision!=null && recall!=null && (precision+recall)>0) ? 2*precision*recall/(precision+recall) : null;
  const matchRate = turns.length ? (matchCount/turns.length*100) : 0;

  body.innerHTML = '';
  const overall = el('div', {class:'stats-overall'});
  overall.append(
    statBox('Turns', turns.length),
    statBox('Match rate', matchRate.toFixed(0)+'%'),
    statBox('Precision', precision!=null ? precision.toFixed(2) : '–'),
    statBox('Recall', recall!=null ? recall.toFixed(2) : '–'),
    statBox('F1', f1!=null ? f1.toFixed(2) : '–'),
    statBox('Codes (both)', totalBoth)
  );
  body.appendChild(overall);

  const orderedFams = FAMILIES.map(f=>f.family).filter(f=>famStats.has(f));
  if(orderedFams.length){
    const table = el('table', {class:'stats-table'});
    const thead = el('tr', {}, [el('th',{},'Family'), el('th',{},'F1'), el('th',{},'H-only'), el('th',{},'Both'), el('th',{},'L-only')]);
    table.appendChild(thead);
    orderedFams.forEach(fam=>{
      const fs = famStats.get(fam);
      const p = (fs.both+fs.llmOnly)>0 ? fs.both/(fs.both+fs.llmOnly) : null;
      const r = (fs.both+fs.humanOnly)>0 ? fs.both/(fs.both+fs.humanOnly) : null;
      const f = (p!=null && r!=null && (p+r)>0) ? 2*p*r/(p+r) : null;
      const tr = el('tr', {}, [
        el('td', {class:'fam-name'}, famLabel(fam)),
        el('td', {}, f!=null ? f.toFixed(2) : '–'),
        el('td', {}, `${fs.humanOnly}`),
        el('td', {}, `${fs.both}`),
        el('td', {}, `${fs.llmOnly}`)
      ]);
      table.appendChild(tr);
    });
    body.appendChild(table);
  }
}

function statBox(label, value){
  return el('div', {class:'stat-box'}, [el('div', {class:'v'}, `${value}`), el('div', {class:'l'}, label)]);
}

// ---------------- Feed / cards ----------------
function codeChipEl(c){
  const color = famColor(c.family);
  const chip = el('span', {class:'turn-code-chip', 'data-code': c.code});
  chip.style.setProperty('--chip-bg', hexToRgba(color, 0.13));
  chip.style.setProperty('--chip-fg', color);
  chip.style.setProperty('--chip-border', hexToRgba(color, 0.35));
  chip.append(el('span', {class:'fam'}, famLabel(c.family) + (c.sub? ' · ':'')), c.sub || '');
  return chip;
}

function compareColumn(label, list, cls){
  const col = el('div', {class:'compare-col ' + cls});
  col.appendChild(el('div', {class:'compare-col-label'}, [label, el('span',{}, `${list.length}`)]));
  if(list.length){
    const chips = el('div', {class:'compare-chips'});
    list.forEach(c=>chips.appendChild(codeChipEl(c)));
    col.appendChild(chips);
  } else {
    col.appendChild(el('div', {class:'compare-empty'}, '—'));
  }
  return col;
}

function renderCard(conv, turnFlags){
  const card = el('div', {class:'conversation-card'});
  const header = el('div', {class:'card-header'});
  header.append(
    el('div', {class:'tag'}, ['Sample ', el('b',{}, `#${conv.sample_number}`)]),
    el('div', {class:'coder-badge'}, (conv.coder||'?').replace('Coder_','Coder ')),
    el('div', {class:'model-badge'}, conv.model),
    el('div', {class:'tag'}, conv.version)
  );
  const matchedCount = conv.turns.filter(t=>t.match).length;
  const totalCount = conv.turns.length;
  const chipCls = matchedCount===totalCount ? 'full' : (matchedCount===0 ? 'none' : 'partial');
  header.appendChild(el('div', {class:'conv-match-chip '+chipCls}, `${matchedCount}/${totalCount} matched`));
  card.appendChild(header);

  const turnsWrap = el('div', {class:'turns'});
  conv.turns.forEach((t, i)=>{
    const matched = turnFlags[i];
    const anyFilterActive = state.search || state.agreement!=='all' || queryIsActive() ||
      state.ranges.turn_number.lo>1 || state.ranges.turn_number.hi<4 ||
      state.ranges.human_count.lo>0 || state.ranges.human_count.hi<9 ||
      state.ranges.llm_count.lo>0 || state.ranges.llm_count.hi<9;
    const row = el('div', {class:'turn-row' + (anyFilterActive && !matched ? ' dimmed':'')});
    const top = el('div', {class:'turn-top'});
    top.append(
      el('div', {class:'turn-marker'}, `${t.turn_number}`),
      el('p', {class:'turn-text'}, t.text),
      el('div', {class:'turn-match-badge ' + (t.match?'match':'mismatch')}, t.match ? 'match' : 'mismatch')
    );
    row.appendChild(top);
    const grid = el('div', {class:'compare-grid'});
    grid.append(
      compareColumn('Human only', t.human_only, 'col-human'),
      compareColumn('Both', t.both, 'col-both'),
      compareColumn('LLM only', t.llm_only, 'col-llm')
    );
    row.appendChild(grid);
    turnsWrap.appendChild(row);
  });
  card.appendChild(turnsWrap);
  return card;
}

function renderFeed(){
  const feed = document.getElementById('feed');
  feed.innerHTML = '';
  const {results} = computeResults();
  if(!results.length){
    feed.appendChild(el('div', {class:'feed-empty'}, [el('div', {class:'glyph'}, '∅'), el('div', {}, 'No conversations match these filters.')]));
    return;
  }
  const frag = document.createDocumentFragment();
  results.forEach(({conv, turnFlags})=> frag.appendChild(renderCard(conv, turnFlags)));
  feed.appendChild(frag);
}

function renderStats(){
  const {results, totalMatchingTurns} = computeResults();
  const matchedVisible = visibleTurns().filter(t=>t.match).length;
  const visibleTotal = visibleTurns().length;
  const rate = visibleTotal ? Math.round(matchedVisible/visibleTotal*100) : 0;
  const statsBar = document.getElementById('statsBar');
  statsBar.innerHTML = '';
  statsBar.append(
    el('span', {}, [document.createTextNode('conversations '), el('b',{}, `${results.length}`), document.createTextNode(` / ${META.n_conversations}`)]),
    el('span', {class:'divider'}),
    el('span', {}, [document.createTextNode('turns '), el('b',{}, `${totalMatchingTurns}`), document.createTextNode(` / ${META.n_turns}`)]),
    el('span', {class:'divider'}),
    el('span', {}, [document.createTextNode('match rate '), el('b',{class:'match-rate'}, `${rate}%`)])
  );
}

function renderAll(){
  renderFilters();
  renderFeed();
  renderStats();
}

// ---------------- Mobile drawer ----------------
document.getElementById('filtersToggleBtn').addEventListener('click', ()=>{
  document.getElementById('filters').classList.add('open');
  document.getElementById('filtersScrim').classList.add('open');
});
document.getElementById('filtersScrim').addEventListener('click', ()=>{
  document.getElementById('filters').classList.remove('open');
  document.getElementById('filtersScrim').classList.remove('open');
});

renderAll();
})();
