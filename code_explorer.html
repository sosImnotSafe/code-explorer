nd thorough arguments.","codes":[{"code":"SIGNAL-Turning Point","family":"SIGNAL","sub":"Turning Point"}]},{"turn_number":3,"text":"What is the one sources that you find most reliable and that you most recommend?","codes":[]},{"turn_number":4,"text":"Thank you for the information. I will have to seek out this report as it should be very interesting to read and may help me come to a final conclusion on what I believe about this conspiracy.","codes":[{"code":"FUTURE-Open","family":"FUTURE","sub":"Open"}]}]},{"sample_number":54,"coder":"Coder_A","participant_id":1242,"pre_score":91.0,"post_score":93.0,"change_score":-2.0,"turns":[{"turn_number":1,"text":"I think that there is other planets with life. I think that there have been some coverups. I find it hard to believe that all the reports of sightings can be fake","codes":[{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"},{"code":"THEME-Space","family":"THEME","sub":"Space"}]},{"turn_number":2,"text":"I think crafts having the power to go billions of miles propelled by a power we dont understand would give then cover and be hard to spot","codes":[{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"STAY-Certain","family":"SIGNAL","sub":"Stay-Certain"}]},{"turn_number":3,"text":"They have technology far greater than ours that will shield them","codes":[{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"},{"code":"STAY-Certain","family":"SIGNAL","sub":"Stay-Certain"}]},{"turn_number":4,"text":"They may have our government helping cover up their existence","codes":[{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"},{"code":"STAY-Certain","family":"SIGNAL","sub":"Stay-Certain"}]}]},{"sample_number":55,"coder":"Coder_A","participant_id":1253,"pre_score":55.0,"post_score":54.0,"change_score":1.0,"turns":[{"turn_number":1,"text":"it is possible and very interesting that the government may have already discovered alien life and has been hiding it from the public for a long time as the galaxy is very large it is highly unlikely that humans are the only form of intelligent life, ------------------------------------------------------------------------------------------","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"},{"code":"THEME-Space","family":"THEME","sub":"Space"}]},{"turn_number":2,"text":"i appreciate your perspective but i must disagree with your points. while its true that the discovery of alien life would be a monumental scientific breakthrough, history has shown numerous examples of governments and organizations keeping significant information hidden from the public, from covert military operations to classified research projects.\r\n\r\neven the existence of organizations dedicated to searching for alien life could be a tool for disinformation to convince the public that they haven't found any evidence of alien life yet","codes":[{"code":"EVIDENCE-Analogy","family":"EVIDENCE","sub":"Analogy"},{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"}]},{"turn_number":3,"text":"The digital era does indeed make it easier for information to be leaked, but it also provides governments with advanced surveillance and censorship capabilities. The ability to monitor and control information flow has increased significantly in recent years, making it more plausible for a government to suppress evidence of extraterrestrial life if they desired to do so. While SETI scientists may have noble intentions, their openness about their methods and findings does not guarantee that they are privy to all government secrets or that they have access to conclusive evidence of extraterrestrial intelligence.\r\n\r\nIt is possible that governments could be concealing information from even reputable scientific organizations like SETI if they believe it is in their best interest to do so ------------------------------------------------------------------------------------------","codes":[{"code":"ATTITUDE-Media","family":"ATTITUDE","sub":"Media"},{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"SIGNAL-Investment-High","family":"SIGNAL","sub":"Investment-High"},{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"}]},{"turn_number":4,"text":"I appreciate your thoughtful response, but I believe you may be underestimating the power and determination of governments when it comes to controlling information, especially when it concerns something as significant as the discovery of extraterrestrial life. While you mention the global network of astronomers and researchers involved in the search for extraterrestrial intelligence, it's essential to note that governments have the resources and influence to potentially manipulate or suppress information discovered by these individuals and organizations. Collaboration and communication barriers, as well as national security interests, could be used to justify keeping such a monumental revelation under wraps. Additionally, while whistleblowers and leaks have brought some secrets to light, the consequences for those speaking out can be severe. Fear of reprisal or legal action may deter individuals from exposing sensitive information, especially if it puts national security or political stability at risk.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"}]}]},{"sample_number":56,"coder":"Coder_A","participant_id":1255,"pre_score":80.0,"post_score":78.0,"change_score":2.0,"turns":[{"turn_number":1,"text":"I don't know if I completely agree, but one conspiracy theory I I find somewhat compelling is that there was a second shooter in the Kennedy assassination. What led me to somewhat find this theory compelling are the eyewitness accounts of people who were there that day and their memory of where they thought they heard the bullets coming from, and from experts, their testimony that there couldn't have been just one shooter based on where the bullets entered and exited,","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Expert","family":"EVIDENCE","sub":"Expert"},{"code":"EVIDENCE-Eyewitness","family":"EVIDENCE","sub":"Eyewitness"},{"code":"SIGNAL-Strength-Weak","family":"SIGNAL","sub":"Strength-Weak"},{"code":"THEME-Assassination","family":"THEME","sub":"Assassination"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"}]},{"turn_number":2,"text":"I do agree with the reliability of forensic science; however; specific to the Warren Commission, it's been said by people who in fact shared information that that information later on disappeared as part of a cover up.","codes":[{"code":"ATTITUDE-Science-Positive","family":"ATTITUDE","sub":"Science-Positive"},{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"}]},{"turn_number":3,"text":"Yes, what happened to the bullet that was left on Kennedy's bed in the operating room that later the doctor there said disappeared?","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"},{"code":"SIGNAL-Investment-High","family":"SIGNAL","sub":"Investment-High"}]},{"turn_number":4,"text":"I don't have further questions.","codes":[]}]},{"sample_number":57,"coder":"Coder_A","participant_id":1264,"pre_score":100.0,"post_score":81.0,"change_score":19.0,"turns":[{"turn_number":1,"text":"I believe in the possibility of some conspiracies, rather than the firm reality of all the theories put out there. for example, I believe there is likely an \"Illuminati\" class making decisions for puppet governments, at times. Just that the idea of money and power being the tools of ultimately a very few at the top of human organizations.","codes":[{"code":"ATTITUDE-Conspiracy-Positive","family":"ATTITUDE","sub":"Conspiracy-Positive"},{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Money/Power","family":"THEME","sub":"Money/Power"},{"code":"THEME-Secret Society","family":"THEME","sub":"Secret Society"}]},{"turn_number":2,"text":"I think that, as far as news reporting or individual participation in specific causes, the illusion of choice or illusion of actual fact reported can be contained in a range that is acceptable to the illuminati because it is useful in keeping the masses under control.","codes":[{"code":"ATTITUDE-Media","family":"ATTITUDE","sub":"Media"},{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"}]},{"turn_number":3,"text":"As a librarian, I am trained to discern reliable sources of information. I absolutely agree that this is an important skill for people to develop.","codes":[{"code":"EXTRA-Ev to Value","family":"EXTRA","sub":"Ev to Value"},{"code":"SIGNAL-Source-Importance","family":"SIGNAL","sub":"Source-Importance"}]},{"turn_number":4,"text":"It is annoying to be told how to manage my own career by AI. no me gusta, ------------------------------------------------------------------------------------------","cod s / Numbers","family":"EVIDENCE","sub":"Stats / Numbers"},{"code":"THEME-Media","family":"THEME","sub":"Media"}]},{"turn_number":2,"text":"I disagree that most bot activity is transparent. Governments, businesses, and special interest groups frequently use bots to spread posts that affirm their views and goals.","codes":[{"code":"ATTITUDE-Media","family":"ATTITUDE","sub":"Media"},{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"}]},{"turn_number":3,"text":"Social media companies know that there are millions of bots, but don't actively remove them because it will make it seem like their platform is less popular and profitable.","codes":[{"code":"ATTITUDE-Media","family":"ATTITUDE","sub":"Media"},{"code":"THEME-Corporation","family":"THEME","sub":"Corporation"},{"code":"THEME-Media","family":"THEME","sub":"Media"}]},{"turn_number":4,"text":"I don't believe that these social media companies have our best interests at heart.\r\n\r\nFacebook and Google have repeatedly violated the privacy of their users in order to profit and will likely continue to do so.","codes":[{"code":"ATTITUDE-Media","family":"ATTITUDE","sub":"Media"},{"code":"SIGNAL-Investment-High","family":"SIGNAL","sub":"Investment-High"},{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"},{"code":"THEME-Media","family":"THEME","sub":"Media"}]}]},{"sample_number":60,"coder":"Coder_A","participant_id":1740,"pre_score":81.0,"post_score":30.0,"change_score":51.0,"turns":[{"turn_number":1,"text":"President Kennedy's assassination - I find it plausible that it was a conspiracy on the part of other governments and not just the work of one man I have watched some documentaries that question whether there were other shooters because of the angles. My family had a personal connection to the Kennedy family many years ago and I tend to think that JFK's assassination was part of a my larger plan to disrupt American politics.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomali ct on the positive legacy of the person. Also, JFK's legacy is a bit different than MLK. I feel like we can have differing opinions on this. I choose to continue believing the conspiracy","codes":[{"code":"ATTITUDE-Conspiracy-Positive","family":"ATTITUDE","sub":"Conspiracy-Positive"},{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"},{"code":"STAY-Certain","family":"SIGNAL","sub":"Stay-Certain"}]},{"turn_number":3,"text":"I still feel like most people are able to separate their positive legacies with a belief that potentially something happened. Being open to new evidence doesn't mean withhold skeptical viewpoints.","codes":[{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"},{"code":"STAY-Certain","family":"SIGNAL","sub":"Stay-Certain"}]},{"turn_number":4,"text":"You just need to keep everything in balance. If someone has a different view than you, there's no need to dismiss it. You could also just accept that someone has a different viewpoint and they don't mean that it's a negative thing","codes":[{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"LACK-Connection","family":"LACK","sub":"Connection"}]}]},{"sample_number":62,"coder":"Coder_A","participant_id":1752,"pre_score":65.0,"post_score":53.0,"change_score":12.0,"turns":[{"turn_number":1,"text":"A conspiracy theory I think is plausible is that UFOs and aliens exist, and the government has covered it up. There are countless reports of sightings and interactions with UFOs and aliens. Just last year, a whistleblower went in front of Congress to talk about this topic. The mainstream news has also jumped on board. Furthermore, we've learned about several UFO programs run by the government. I find all of this evidence compelling. The Congressional hearing involving whistleblower David Grusch is a compelling piece of evidence. The UFO videos published  do agree that more awareness should be brought up about driving under the influence. There are so many senseless deaths because of this. Thank you for clearing that up for me.","codes":[{"code":"EXTRA-Ev to Value","family":"EXTRA","sub":"Ev to Value"},{"code":"SIGNAL-Investment-Low","family":"SIGNAL","sub":"Investment-Low"},{"code":"SIGNAL-Turning Point","family":"SIGNAL","sub":"Turning Point"}]},{"turn_number":3,"text":"I would love to know more about what I could do to prevent more senseless deaths because of drunk driving. I want to help others and improve safety on the roads I travel on with my small child","codes":[{"code":"EXTRA-Change Topic","family":"EXTRA","sub":"Change Topic"},{"code":"EXTRA-Ev to Value","family":"EXTRA","sub":"Ev to Value"},{"code":"FUTURE-Moral","family":"FUTURE","sub":"Moral"}]},{"turn_number":4,"text":"I really appreciate all of these tips, they are so helpful and I can do all of these things now moving forward. I will look out for others around me and make sure they are making safe choices as well.","codes":[]}]},{"sample_number":72,"coder":"Coder_A","participant_id":1876,"pre_score":100.0,"post_score":10.0,"change_score":90.0,"turns":[{"turn_number":1,"text":"The murder of JFK in Dallas postulates that from the wounds he sustained there had to be more than one shooter. I tend to agree with that assumption.\r\n\r\nNumerous programs and written articles have indicated that crime scene evidence, autopsy reports, and supposed eye witness reports show there had to be more and one shooter.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Eyewitness","family":"EVIDENCE","sub":"Eyewitness"},{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"SIGNAL-Strength-Weak","family":"SIGNAL","sub":"Strength-Weak"},{"code":"THEME-Assassination","family":"THEME","sub":"Assassination"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"}]},{"turn_number":2,"text":"I accept that with the advances in forensic technology conclusions made in 1963 could be refuted. However, the updated opinions state it \"could\" have been from a single shooter.\r\n\r\nWhile this does provide more validity to the one-shooter theory, it does not definitively prove there couldn't have been a second shooter.","codes":[{"code":"ATTITUDE-Science-Positive","family":"ATTITUDE","sub":"Science-Positive"},{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"}]},{"turn_number":3,"text":"I agree that the option with the fewest variables is likely correct. I also understand that in science it is rare to have a concrete yes or no answer to anything so the word \"could\" isn't surprising. While I agree that the possibility of a second shooter is highly unlikely, it cannot be absolutely proven.","codes":[{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"}]},{"turn_number":4,"text":"At the end of the day, the only absolute is that JFK was killed by a shot to the head.\r\n\r\nWhether there was one shooter or two, while important to historical accuracy, it is not necessary to have a definite answer.","codes":[{"code":"FUTURE-IDC","family":"FUTURE","sub":"IDC"}]}]},{"sample_number":73,"coder":"Coder_A","participant_id":1894,"pre_score":75.0,"post_score":50.0,"change_score":25.0,"turns":[{"turn_number":1,"text":"One such conspiracy theory is Martin Luther King and JFK\"s death. There has been constant speculation of the FBI being a part of both It has been said the the CIA held pertinent information to this date that hasn't been release. One theory showed 4 shots being fired for JFK which studies showed there were 2 shooters which wasn't found","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"THEME-Assassination","family":"THEME","sub":"Assassinati 86.0,"post_score":0.0,"change_score":86.0,"turns":[{"turn_number":1,"text":"When ATT had their massive blowout when phones and internet services went down, there was a conspiracy theory that those who were affected did not get vaccinated. It was kind of funny cause the majority of my family who were vaccinated did not have this issue. While others who did not were. I mean that was the most I could share as it was short lived. I did ask around to other people wt see if they had issues with and if they were vaccinated and many were not.","codes":[{"code":"THEME-Science","family":"THEME","sub":"Science"}]},{"turn_number":2,"text":"I did not believe this conspiracy theory, it was all over facebook and was interesting how many people did believe this.","codes":[{"code":"SIGNAL-Investment-Low","family":"SIGNAL","sub":"Investment-Low"},{"code":"SIGNAL-Strength-Weak","family":"SIGNAL","sub":"Strength-Weak"},{"code":"SIGNAL-Uncertain","family":"SIGNAL","sub":"Uncertain"}]},{"turn_number":3,"text":"Thanks, People believe anything and everything these days. They all want to be seen and heard in some form and fashion. And fabricating theories is one way to do it. I agree to double check sources in all situations now.","codes":[{"code":"EXTRA-Ev to Value","family":"EXTRA","sub":"Ev to Value"},{"code":"SIGNAL-Source-Importance","family":"SIGNAL","sub":"Source-Importance"}]},{"turn_number":4,"text":"thanks for sharing your thoughts. This was thought provoking and gave me insight to share with others when in dobut.","codes":[{"code":"SIGNAL-Turning Point","family":"SIGNAL","sub":"Turning Point"}]}]},{"sample_number":77,"coder":"Coder_A","participant_id":1931,"pre_score":50.0,"post_score":10.0,"change_score":40.0,"turns":[{"turn_number":1,"text":"JFK's assassination given how difficult it seems for one person to have pulled off The Zapruder film and the \"magic\" bullet. I've also heard theories about why the American government would want to have JFK assassinated to avoid turmoil i ssination"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"}]},{"turn_number":2,"text":"That all may be well and good, and much of what you have said is likely the case. Thank you for laying all of that out. However it does beg the question of why most if not all official documents from that era are still classified, despite numerous different presidents stating that they would declassify, even going so far as to change the expiration dates on when those documents should be public.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"},{"code":"SIGNAL-Investment-High","family":"SIGNAL","sub":"Investment-High"}]},{"turn_number":3,"text":"What do you think about the theory that the driver was using a smokeless, pneumatic pistol? In the Zapruder film, you can see the driver take his hand off the wheel and point something at the president, just as he is hit.","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"},{"code":"SIGNAL-Investment-High","family":"SIGNAL","sub":"Investment-High"}]},{"turn_number":4,"text":"Understandable, thank you for your time.","codes":[]}]},{"sample_number":87,"coder":"Coder_A","participant_id":2035,"pre_score":85.0,"post_score":100.0,"change_score":-15.0,"turns":[{"turn_number":1,"text":"When the US government tested LSD on the general public. MK ULTRA. I'm not sure it is a conspiracy theory anymore, though. But this is incredibly compelling to me, not only because of the subject matter, but also because it goes to show how insane something can be but also end up being true. I think it ended up proving to be true decades later. The reason it is so compelling is because if someone at that time was saying this was happening they would've been marked as tin-foil hat-wearing and insane. Yet, it turned out they weren't crazy after all and that it was true.","codes":[{"code":"?","family":"?","sub":""},{"code":"ATTITUDE-Conspiracy-Positive","family":"ATTITUDE","sub":"Conspiracy-Positive"},{"code":"ATTITUDE-Others","family":"ATTITUDE","sub":"Others"},{"code":"EVIDENCE-Others","family":"EVIDENCE","sub":"Others"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"}]},{"turn_number":2,"text":"At the time someone would have been labeled insane if they claimed that this was happening. Why is it that we don't give more credibility to the claims of modern conspiracy theories with this instance in mind?","codes":[{"code":"ATTITUDE-Conspiracy-Positive","family":"ATTITUDE","sub":"Conspiracy-Positive"},{"code":"EVIDENCE-Analogy","family":"EVIDENCE","sub":"Analogy"},{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":3,"text":"As unlikely as it might be, is it possible that there is a world controlling cabal that is a group of the most powerful people on earth that act even above world governments? I again acknowledge that it is incredibly implausible, however, couldn't it theoretically be possible?","codes":[{"code":"EXTRA-Change Topic","family":"EXTRA","sub":"Change Topic"},{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"},{"code":"EXTRA-Question-New","family":"EXTRA","sub":"Question-New"},{"code":"FAllACY-User","family":"FAllACY","sub":"User"},{"code":"THEME-Money/Power","family":"THEME","sub":"Money/Power"},{"code":"THEME-Secret Society","family":"THEME","sub":"Secret Society"}]},{"turn_number":4,"text":"See that's the thing though, there could be proof and we would deny the validity of it.\r\n\r\nYes, there are a lot of countries, but how many \"matter\" in terms of financial implications and power. Not many countries yield power. And in terms of diverse interests, I don't think a group of billionaires and political figures would have too diverse of interests from one another. They would all seek more power, financial gain, and more control.","codes":[{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"THEME-Money/Power","family":"THEME","sub":"Money/Power"}]}]},{"sample_number":88,"coder":"Coder_A","participant_id":2048,"pre_score":97.0,"post_score":77.0,"change_score":20.0,"turns":[{"turn_number":1,"text":"One I remember is the conspiracy about the murder of JFK being planned by the government.\r\n\r\nI think it's a bit compelling because of hidden documents that came to light after the fact. Some alleged evidence is the magic bullet theory, that questioned how one bullet hit jfk and the Texas governor. Also, people believe there is no way Lee Harvey Oswald acted on his own.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"THEME-Assassination","family":"THEME","sub":"Assassination"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"}]},{"turn_number":2,"text":"Thanks for the detailed information. I understand you've compiled this information from different sources and that's of value for me.","codes":[{"code":"ATTITUDE-AI-Positive","family":"ATTITUDE","sub":"AI-Positive"},{"code":"SIGNAL-Source-Importance","family":"SIGNAL","sub":"Source-Importance"}]},{"turn_number":3,"text":"Can you delve a little bit more into other reasons why people think the government planned jfk's murder?","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":4,"text":"Thanks for the info!","codes":[]}]},{"sample_number":89,"coder":"Coder_A","participant_id":2064,"pre_score":75.0,"post_score":80.0,"change_score":-5.0,"turns":[{"turn_number":1,"text":"The flat earth theory is something I have considered. I read the Bible and believe completely and fully in Jesus Christ. I feel there is evidence in the Bible that could support this theory. The fact that the creation story does not mention the creation of any planets is pretty thought provoking. However, I have seen both sides and cannot really be sure. It is definitely an interesting one! The fact that the creation story in the Bible doesn't talk about the creation of planets, only stars, the moon, and the sun, is pretty good evidence for the flat earth theory. The information about the firmament and things like that also are sort of compelling. I still haven't been convinced it is just interesting to think about.","codes":[{"code":"?","family":"?","sub":""},{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"SIGNAL-Strength-Weak","family":"SIGNAL","sub":"Strength-Weak"},{"code":"SIGNAL-Uncertain","family":"SIGNAL","sub":"Uncertain"}]},{"turn_number":2,"text":"While I do appreciate science, I also believe that the Bible is the word of God. If God wanted to have the writer of the scripture write in a certain way, He could easily do so.\r\n\r\nI don't think that the Holy Scriptures of God have to be held back by what people understood at the time. God can do anything and I believe He does and can preserve His word and gave knowledge to the chosen writers so that we could understand His greatness.","codes":[{"code":"?","family":"?","sub":""},{"code":"ATTITUDE-Science-Positive","family":"ATTITUDE","sub":"Science-Positive"},{"code":"FAllACY-User","family":"FAllACY","sub":"User"}]},{"turn_number":3,"text":"Science and scripture can compliment each other. However, they can also greatly differ.\r\n\r\nThe theory of evolution and the big bang theory completely go against the story of creation in the Bible. So while I do think that there is some merit to some scientific findings, there are also some great discrepancies. That is why I will always go to the Bible for all truth and understanding and never rely on science fully. In Proverbs it tells us to lean not on our own understanding and to trust in God with all our heart.\r\n\r\nTherefore, God's word will surpass any human explanation for me personally.","codes":[{"code":"?","family":"?","sub":""},{"code":"ATTITUDE-Others","family":"ATTITUDE","sub":"Others"}]},{"turn_number":4,"text":"I fully agree that God's creation is much more vast and intricate than any human mind can ever comprehend. However, I cannot see any similarities at all in the big bang theory, the evolution theory, and the creation story. I believe that the Bible warns us to be aware of the plans of the enemy to confuse us. Believing in many different theories that are not outlined in the Bible serve no purpose for a true follower of Jesus Christ. Satan is the author of confusion, not God. Multiple theories or stories only serve as a confusion tactic and take away from the beauty of God's creation.","codes":[{"code":"?","family":"?","sub":""},{"code":"ATTITUDE-Others","family":"ATTITUDE","sub":"Others"}]}]},{"sample_number":90,"coder":"Coder_A","participant_id":2067,"pre_score":75.0,"post_score":60.0,"change_score":15.0,"turns":[{"turn_number":1,"text":"One conspiracy theory I find to be compelling/credible is the theory about the Royal Family having a hand in Princess Diana's death. I think given all the information that and speculation surrounding the topic, it's hard not to be drawn in and start to see where people are coming from. I think given the timelines, videos, articles, and other pieces of media people have brought up and strung together plays a part in it, as well as the way the British media as well as Kensington Palace have handled it.","codes":[{"code":" e right decisions to use those tools for good and not evil.","codes":[{"code":"THEME-Money/Power","family":"THEME","sub":"Money/Power"}]},{"turn_number":3,"text":"I believe if we act in the interest of the people we can come together and work together to protect everybody's rights. For us to progress in the right direction we have to stay positive and uplift others the way we want to be treated and protected.","codes":[{"code":"INVOKE-Morality","family":"INVOKE","sub":"Morality"}]},{"turn_number":4,"text":"Yes, I believe if we can all come together no matter which race, which religion, which back round you are from, if you input your opinion it has value to help the community become greater as a whole, to help achieve the ultimate vision of becoming a society of unity and peace.","codes":[{"code":"FUTURE-Moral","family":"FUTURE","sub":"Moral"}]}]},{"sample_number":92,"coder":"Coder_B","participant_id":466,"pre_score":88.0,"post_score":12.0,"change_score":76.0,"turns":[{"turn_number":1,"text":"The 9/11 attack where the twin towers imploded before impact by the airplane. The way the towers fell it seemed like there were explosions internally before impact. Professional detonation experts did an analysis showing how it would have been affected. There are also accounts from survivors saying they felt tremors before the plane had hit.","codes":[{"code":"EVIDENCE-Anecdotal","family":"EVIDENCE","sub":"Anecdotal"},{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Eyewitness","family":"EVIDENCE","sub":"Eyewitness"},{"code":"THEME-Assassination","family":"THEME","sub":"Assassination"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"}]},{"turn_number":2,"text":"I feel more enlightened from it. It has definitely changed my point of view.","codes":[{"code":"SIGNAL-Turning Point","family":"SIGNAL","sub":"Turning Point"},{"code":"SIGNAL-Uncertain","family":"SIGNAL","sub":"Uncertain"}]},{"turn_number":3,"text":"I have no n accurate shot.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"}]},{"turn_number":3,"text":"Oswald had a new daughter that was only a few days old when he allegedly assassinated Kennedy. He tried unsuccessfully to gain citizenship in Russia, where his wife was from. I often wonder why he would choose to kill Kennedy at that time in his life.","codes":[{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"SIGNAL-Investment-High","family":"SIGNAL","sub":"Investment-High"}]},{"turn_number":4,"text":"I really don't know what Oswald's motivations would have been behind what he did. He left behind his young daughters and his wife to fend for themselves. Maybe he was trying to gain favor with Russia or Cuba. Maybe he was trying to make a political statement.\r\n\r\nSometimes it's impossible to know why someone acts out in a violent way.","codes":[{"code":"INVOKE-General","family":"INVOKE","sub":"General"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-International Politics","family":"THEME","sub":"International Politics"}]}]},{"sample_number":118,"coder":"Coder_B","participant_id":2291,"pre_score":65.0,"post_score":38.0,"change_score":27.0,"turns":[{"turn_number":1,"text":"JFK was part of a plan by the government. JFK's death was planned all along by people from the CIA. It was part of a conspiracy.","codes":[{"code":"THEME-Assassination","family":"THEME","sub":"Assassination"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"}]},{"turn_number":2,"text":"There was a second shoorter on the grassy knoll. He was part of the CIA.. He escaped.\r\n\r\nThere is evidence of him.","codes":[]},{"turn_number":3,"text":"There may or may not have been a second shooter. There is no conclusive evidence so I err on the side of caution and say there was a second shooter.","codes":[{"code":"SIGNAL-Turning Point","family":"SIGNAL","sub":"Turning Point"}]},{"turn_number":4,"text":"In the end, there is no conclusive proof either way.","codes":[{"code":"FUTURE-IDC","family":"FUTURE","sub":"IDC"}]}]},{"sample_number":119,"coder":"Coder_B","participant_id":2295,"pre_score":80.0,"post_score":81.0,"change_score":-1.0,"turns":[{"turn_number":1,"text":"One conspiracy that I believe to be true is that aliens are actually inter-dimensional beings. This has come up a few times in recent memory, along with some videos to \"prove\"\r\n\r\nit, but I remember coming up with the exact same conclusion as a way to explain paranormal activity when I was struggling with my religious identity. Yes, specifically the video footage inside the mall (I don't remember exactly which mall it was\". This lines up with something I saw as a young child, but I'm not comfortable going into more detail than this at the moment.","codes":[{"code":"ATTITUDE-Others","family":"ATTITUDE","sub":"Others"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"THEME-Space","family":"THEME","sub":"Space"}]},{"turn_number":2,"text":"Exactly! So many people are so quick to pass off anything they don't understand as the work of the divine rather than consider other possibilities.","codes":[]},{"turn_number":3,"text":"What do you think about all of the people that say they have witnessed a UFO or been abducted by aliens? Personally I think this was made popular and is sort of a \"boy who cried wolf\" scenario.","codes":[{"code":"EVIDENCE-Analogy","family":"EVIDENCE","sub":"Analogy"},{"code":"EVIDENCE-Eyewitness","family":"EVIDENCE","sub":"Eyewitness"},{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":4,"text":"I agree completely. While I don't believe that all of these reports are false, I do think there are a fair amount of people that ran in terror when they saw a street light on a foggy day. This, I think, les are locked away from the American people, we might never know the truth except the \"official\" narratives. But thanks be to GOD Almighty of Israel, there will be a Judgment Day for ALL to be Revealed and to be Judged Justly.","codes":[{"code":"INVOKE-Morality","family":"INVOKE","sub":"Morality"}]}]},{"sample_number":137,"coder":"Coder_B","participant_id":2432,"pre_score":76.0,"post_score":80.0,"change_score":-4.0,"turns":[{"turn_number":1,"text":"I have heard that Hunter Biden was paid off by other countries that are enemies of the U.S. I resisted the idea at first, but watched a video from a credible source that presented them in a factual and professional manner. The presenter had obviously done quite a bit of research, and shared many details and facts that were very compelling. I would not have even watched the video if it had been presented by someone who was obviously trying to stir people up into anger, or who obviously hadn't done their homework, or who seemed more interested in denigrating Hunter Biden than in presenting facts. It's actually been a while since I watched that video so I'm not sure why it popped into my head, but unfortunately I can't remember many of the details now. I mostly remember being impressed with how well-researched it was.","codes":[{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"SIGNAL-Investment-Low","family":"SIGNAL","sub":"Investment-Low"},{"code":"SIGNAL-Uncertain","family":"SIGNAL","sub":"Uncertain"},{"code":"THEME-International Politics","family":"THEME","sub":"International Politics"}]},{"turn_number":2,"text":"You have presented some important considerations, and I mostly agree with them.\r\n\r\nUnfortunately, there are many journalists and even top authorities who for one reason or another do not actually follow the \"strict ethical guidelines\" that you mentioned. Also, while I have a long-time habit of reading and listening to a variety of news sources, I have found :"SIGNAL","sub":"Stay-Certain"}]},{"turn_number":3,"text":"I know the evidence is true due to documents that have been released showing the proof that it is not made up. The evidence was filed away not to come out but people brought the documents out to show the proff of it not being a lie.","codes":[{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"}]},{"turn_number":4,"text":"The documents was filed away like redacted and then they opened them up to the public to see the evidence.","codes":[{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"}]}]},{"sample_number":139,"coder":"Coder_B","participant_id":2463,"pre_score":80.0,"post_score":50.0,"change_score":30.0,"turns":[{"turn_number":1,"text":"One conspiracy theory I find compelling is the idea that all major companies within the United States are all owned, at least partially, by the same people/organizations. I find this compelling because there are multiple videos and articles diving into this topic and the more you watch or read, the more you start to conspire on your own. One source of information I found interesting was the idea that the Rothschild family is the family that owns everything. People have found connections between the Rothschild family and a handful of major corporations that lead them to believe in their ownership of said corporations.","codes":[{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"THEME-Corporation","family":"THEME","sub":"Corporation"},{"code":"THEME-Secret Society","family":"THEME","sub":"Secret Society"}]},{"turn_number":2,"text":"I think it is also important to point out that almost every publicly traded company is owned somewhat by the same companies such as Blackrock, that the same people, such as the Rothschild family, own major stakes in.","codes":[{"code":"SIGNAL-Investment-High","family":"SIGNAL","sub":"Investment-High"}]},{"turn_number":3,"text":"I think I learned a lot about this conspiracy theory after reading all of this information. I knew there was not a lot of truth behind it in the first place, but it is still cool to become more well versed in a certain topic like this one.","codes":[{"code":"SIGNAL-Turning Point","family":"SIGNAL","sub":"Turning Point"}]},{"turn_number":4,"text":"Thanks for helping me quench my curiosity on this topic and hope you continue to learn more and become a better AI in the future.","codes":[{"code":"FUTURE-Open","family":"FUTURE","sub":"Open"}]}]},{"sample_number":140,"coder":"Coder_B","participant_id":2465,"pre_score":90.0,"post_score":90.0,"change_score":0.0,"turns":[{"turn_number":1,"text":"I find the theory that someone other than Lee Harvey Oswald shot JFK compelling. I find this compelling because the it seemed improbable the bullets could've came from the location Lee Harvey Oswald was at the time. I also find the events after that suspicious, such as Jack Ruby shooting Oswald within two days of the JFK assassination, combined with Jack Ruby's friendships with law enforcement and his business dealings. I have read details and listened to Oliver Stone explaining that an unusual amount of damage was done from a bullet that looked like it didn't hit anything. They found more metal fragments than could've come from the bullet. The FBI lied about the chain of custody of the evidence. Oswald was not a good enough shot nor did he take the shot at the most opportune time if it was him. Any evidence suggesting the original story is true is not highly verifiable.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"THEME-Assassination","family":"THEME","sub":"Assassination"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"}]},{"turn_number":2,"text":"Is it possible that the Warren Commission and ic issue.\r\n\r\nPeople like Nancy Pelosi said vaccination is a personal thing and choice and making them or masks mandatory would not happen. Again, the public was lied to over and over again and there are still people who not only defend the lies, but they double down on the many holes in these theories.","codes":[{"code":"ATTITUDE-Media","family":"ATTITUDE","sub":"Media"},{"code":"ATTITUDE-Others","family":"ATTITUDE","sub":"Others"},{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"THEME-Corporation","family":"THEME","sub":"Corporation"},{"code":"THEME-Money/Power","family":"THEME","sub":"Money/Power"}]}]},{"sample_number":148,"coder":"Coder_B","participant_id":2546,"pre_score":70.0,"post_score":9.0,"change_score":61.0,"turns":[{"turn_number":1,"text":"A conspiracy theory of there being a group called illuminati, there has been compelling videos that have analyzed the situations and it seems so true. Growing up there were particular signs and symbols people attributed to the Illuminati. Musicians usually dressed a certain way, and speak a language that was not normal. There are people on Youtube who have made videos to analyze the secret society, with different evidence.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"THEME-Secret Society","family":"THEME","sub":"Secret Society"}]},{"turn_number":2,"text":"Well, all you said is really true and it is very possible everything was just a lie and there is no secret society anywhere, it might have just been made up by people.","codes":[{"code":"SIGNAL-Turning Point","family":"SIGNAL","sub":"Turning Point"}]},{"turn_number":3,"text":"Thank for enlightening me on this issue, i now believe there is no secret society named Illuminati it was just made up by people.","codes":[{"code":"SIGNAL-Uncertain","family":"SIGNAL","sub":"Uncertain"}]},{"turn_number":4,"text":"I do not sub":"Strength-Weak"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"},{"code":"THEME-Science","family":"THEME","sub":"Science"}]},{"turn_number":2,"text":"What credible sources do you suggest I read from?","codes":[{"code":"SIGNAL-Source-Importance","family":"SIGNAL","sub":"Source-Importance"}]},{"turn_number":3,"text":"Do these organizations benefit from climate change? Don't they get more funds because they're investing in climate change?","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":4,"text":"Noted. Are they working on making sustainability cheaper?","codes":[{"code":"EXTRA-Question-New","family":"EXTRA","sub":"Question-New"}]}]},{"sample_number":197,"coder":"Coder_C","participant_id":2762,"pre_score":90.0,"post_score":20.0,"change_score":70.0,"turns":[{"turn_number":1,"text":"A conspiracy theory that could be credible is the widespread use of subliminal messages in advertising. It's been shown in some research that this type of message has an effect on our subconscious. There have even been court cases where people blamed advertising, music and other types of videos and audio for using subliminal messaging to make them buy things and do things that they otherwise think they wouldn't have done. And it's done so quickly that nobody would know that it was being done to them and there is nobody that regulates this type of messaging or checks of it in our ads. Years ago I read some interesting research about while writing an essay for a class. It shows that images made the biggest impact on making people want a product or food while watching an ad but would say that they never saw the image of the product before; however, they did in the experiment, it was hidden in a video that had watched shortly before expressing that they craved the food.","codes":[{"code":"ATTITUDE-Others","family":"ATTITUDE","sub":"Others"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"THEME-Media","family":"THEME","sub":"Media"}]},{"turn_number":2,"text":"Does the FTC actively review all advertising for subliminal messaging or images or do they only look into it if there is a complaint like most governmental organizations? Are companies that are found to have been using deceptive advertising punished by the courts with fines and punitive damages? Just because it's not wide spread, doesn't mean that it isn't used in marketing. It isn't mean to mind control or total controlling of person.","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":3,"text":"Okay, I understand better why a company wouldn't want to use this type of messaging in their advertising. Also, if there isn't a lot of scientific evidence that it works well enough to risk what could happen to a company, it is less likely used.","codes":[{"code":"SIGNAL-Turning Point","family":"SIGNAL","sub":"Turning Point"}]},{"turn_number":4,"text":"Thanks, it was interesting discussing this theory and you've provided me with a lot of information to weight both sides of it better. There are better proven advertising techniques that would work better for companies.","codes":[]}]},{"sample_number":198,"coder":"Coder_C","participant_id":2752,"pre_score":61.0,"post_score":66.0,"change_score":-5.0,"turns":[{"turn_number":1,"text":"The chemtrail conspiracy theory is one that resonates with me the most compared to others.\r\n\r\nEveryday, I see these jets shooting this stuff out of the sky and it even seems like the jets are purposely doing it to form fake clouds that float a certain direction in order to manipulate the weather. The evidence includes daily sightings of jets flying in the sky forming the chemtrails. Also, the clouds that form after the chemtrails are left for a while which apparently has some effect on the amount of sunlight penetrates the earth's surface.","codes":[{"code":"EVIDENCE-Anecdotal","family":"EVIDENCE","sub":"Anecdotal"},{"code":"EVIDENCE-Eyewitness","family":"EVIDENCE","sub":"Eyewitness"},{"code":"THEME-Science","family":"THEME","sub":"Science"}]},{"turn_number":2,"text":"\"I find the arguments presented to be quite persuasive. However, I still have some doubts that linger. For instance, why do the planes always leave visible trails in the sky and fly at such high altitudes? Additionally, there is evidence to suggest that technology for manipulating the weather to address global warming exists. Therefore, while the argument against the conspiracy theory is strong, it is still possible that it might be true.\"","codes":[{"code":"BECOME-Uncertain","family":"SIGNAL","sub":"Become-Uncertain"},{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"},{"code":"SIGNAL-Turning Point","family":"SIGNAL","sub":"Turning Point"}]},{"turn_number":3,"text":"It does, thanks for the information. This makes me want to do more research.","codes":[{"code":"FUTURE-Open","family":"FUTURE","sub":"Open"}]},{"turn_number":4,"text":"Okay, thanks and goodbye!","codes":[]}]},{"sample_number":199,"coder":"Coder_C","participant_id":3228,"pre_score":100.0,"post_score":4.0,"change_score":96.0,"turns":[{"turn_number":1,"text":"How many dead bodies are there associated with the Clintons? Weather they had anything to do with it or not there are a lot which makes one wonder. Many of the deaths are unexplained and others simply were not accurate. Reported as suicide but no evidence supports that and things like that. The number of bodies is what makes me wonder if there really is something to it.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"}]},{"turn_number":2,"text":"As with any information and news you have to -Government Cover-up","family":"THEME","sub":"Government Cover-up"},{"code":"THEME-Science","family":"THEME","sub":"Science"}]},{"turn_number":2,"text":"I was only referring to one situation. This one example of corporate misconduct does not mean that I think that all companies are corrupt.","codes":[{"code":"?","family":"?","sub":""}]},{"turn_number":3,"text":"No, this is one example where a conspiracy theory turned out to be true. It shows how a company will put profit ahead of public health, If we don't study and remember past wrongs that society or companies do people will forget that they have to be held accountable and they might be able to revert to their old ways.","codes":[{"code":"ATTITUDE-Others","family":"ATTITUDE","sub":"Others"},{"code":"EXTRA-Change Topic","family":"EXTRA","sub":"Change Topic"},{"code":"INVOKE-Morality","family":"INVOKE","sub":"Morality"}]},{"turn_number":4,"text":"Yes, we can agree. It was nice talking to you.","codes":[]}]},{"sample_number":201,"coder":"Coder_C","participant_id":3224,"pre_score":80.0,"post_score":80.0,"change_score":0.0,"turns":[{"turn_number":1,"text":"I think it is plausible that clean energy advancements are being suppressed by fossil fuel industries. There is a history of large corporations burying 'the little guy' who comes up with a better approach or product. The Tucker automobile is an example I learned of as a kid. As far as energy companies, we know that politicians who have ties to fossil fuel companies undercut clean energy and even weaken the EPA when in a position to do so.","codes":[{"code":"EVIDENCE-Anecdotal","family":"EVIDENCE","sub":"Anecdotal"},{"code":"SIGNAL-Strength-Weak","family":"SIGNAL","sub":"Strength-Weak"},{"code":"THEME-Corporation","family":"THEME","sub":"Corporation"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"}]},{"turn_number":2,"text":"You make good points about current progress. But when it comes to the United States, where I live, progress is only as good as government policy. And those policies change dramatically based on which political party has control. For example, you mention the Paris Agreement. Under Republican leadership, the United States dropped out of the Paris Agreement. Under Democratic leadership, the country rejoined. This back and forth can be expected to continue.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"}]},{"turn_number":3,"text":"I am always happy to see local progress and local activism. But I'm not seeing enough bipartisan cooperation on clean energy and other environmental concerns related to slowing (or reversing) climate change. The kind of cooperation needed is countrywide and global.\r\n\r\nAnd individuals, individual companies, and individual tech isn't enough for significant change. The change must happen industrywide.","codes":[{"code":"INVOKE-Morality","family":"INVOKE","sub":"Morality"},{"code":"INVOKE-Partisanship","family":"INVOKE","sub":"Partisanship"},{"code":"STAY-Certain","family":"SIGNAL","sub":"Stay-Certain"}]},{"turn_number":4,"text":"Thank you for the information. One reason I remain pessimistic is that we recently had a global event that tested humanity's ability for collective action: COVID-19. In many ways, even though the evidence was right in front of us and often meant life or death, we failed that test. We got bogged down in partisanship, conspiracy theories, and plain stubborness to give up 'personal freedoms' for the sake of protecting lives.","codes":[{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"},{"code":"STAY-Certain","family":"SIGNAL","sub":"Stay-Certain"}]}]},{"sample_number":202,"coder":"Coder_C","participant_id":3223,"pre_score":100.0,"post_score":70.0,"change_score":30.0,"turns":[{"turn_number":1,"text":"There have been countless sightings of a Loch Ness monster at Flathead Lake, Montana. I believe there is or was a Loch Ness monster and it was covered up so the public would not panic. It resonates with me because I am fascinated with what lives underwater and how little we really know about it. There have been countless sightings, photographs, and some sonar readings about this monster. Hugh Gray published a photo of the monster and there was no photoshop back then. Science will always try to give an explanation but it doesn't mean they are right about everything. I interrupt the evidence is that they want to cover up everything they can because they don't want mass pandemonium.","codes":[{"code":"ATTITUDE-Science-Negative","family":"ATTITUDE","sub":"Science-Negative"},{"code":"EVIDENCE-Expert","family":"EVIDENCE","sub":"Expert"},{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"SIGNAL-Investment-High","family":"SIGNAL","sub":"Investment-High"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"},{"code":"THEME-Science","family":"THEME","sub":"Science"}]},{"turn_number":2,"text":"I believe you make some excellent points but sometimes certain things cannot be explained by science. Cover-ups have been around forever and they will sacrifice whoever for the casue.","codes":[{"code":"ATTITUDE-Conspiracy-Positive","family":"ATTITUDE","sub":"Conspiracy-Positive"}]},{"turn_number":3,"text":"I believe the government controls whatever they want to and any whistleblower can be made to disappear in an instance.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"},{"code":"STAY-Certain","family":"SIGNAL","sub":"Stay-Certain"}]},{"turn_number":4,"text":"Money and power control the world. Any system in place can be finagled to produce the outcome someone wants. It wouldn't be hard to scare being into doing what they want and the threat of jail or death usually causes most people to follow the story.","codes":[{"code":"THEME-Money/Power","family":"THEME","sub":"Money/Power"}]}]},{"sample_number":203,"coder":"Coder_C","participant_id":3202,"pre_score":85.0,"post_score":81.0,"change_score":4.0,"turns":[{"turn_number":1,"text":"I find a lot of the rumors or mysterious dealings Trump and his family had with various foreign governments, leaders, etc. to be entirely believable given his shady history over the last half century or longer. For example, stuff with Russia, Saudis, Epstein, China, insurrections, etc. ranging from issues like Jamal Khashoggi, Russian blackmail, Russian funding, and so on. When you have someone with an extensive criminal history who seems to only desire money and power, I'd lend some credibility to some of the theories and rumors out there. It's been kind of a slow buildup over the last 8 years as more and more is learned and dug into about Trump's history and business and social life. I guess I did a poor job of selecting a specific conspiracy theory and not all of them surrounding a person. But one more specific example would be maybe Russian blackmail on Donald Trump. I believe real reporting over the decades that after traveling to the Soviet Union in the 80s? he seemed to develop a weird interest and alignment with some Soviet Union foreign policy views. Coupled with the emergence of several wives from the area and there's a conspiracy theory that somewhere around all that blackmailable material might have emerged. And then later on, in the 2000s? I believe Western banks and stuff wouldn't loan Trump money anymore because he was so terrible with money, but the Trumps suddenly started getting a ton of money through Russian banks. Then Russian election interference to help him, Trump's connection with Putin and policy decisions while President, all that complicated stuff. And the infamous pee tape stuff might not be true but there might be similar things given his behavior, criminal or immoral, around similar topics, and I think one has to wonder how all of that type of stuff fits together. And I believe some of classified documents Trump went to lengths to steal were things like nuclear-related secrets. I am probably forgetting a thousand interesting details and other events around Trump and Russia but I think it has to make someone wonder what is going on. I would feel the exact same way if that much happened around any Democrat and Russia. I guess the commonly accepted explanation is it's all just a coincidence or propaganda and something that naturally happened between the rich and powerful and those with dictatorial tendencies, but given Putin's spycraft and Trump's lifestyle and all the money and power flowing around, I interpret the evidence more as a pattern leading to conspiracy than there not being something.","codes":[{"code":"ATTITUDE-Conspiracy-Positive","family":"ATTITUDE","sub":"Conspiracy-Positive"},{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"EVIDENCE-Anecdotal","family":"EVIDENCE","sub":"Anecdotal"},{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"FAllACY-User","family":"FAllACY","sub":"User"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-International Politics","family":"THEME","sub":"International Politics"}]},{"turn_number":2,"text":"Yes, I understand that there has been a lot of reporting and investigations surrounding these actions. I also believe investigations like the Mueller Report were hamstrung by what they were allowed to investigate within the confines of its scope, other investigations were attempted to be shutdown, officials involved with them were attempted to be coerced or fired, and so on. I forgot about Trump's impeachment to add to his ongoing pattern of behavior. Given people in his orbit being convicted of crimes done on his behalf also indicates his involvement even though he has thus far gotten away. And I think it's naive to state that things at Mar a Lago are not tied to foreign influence or espionage, as I believe 1 or 2 known spies have been publicly found there, and given his treatment of classified material there, it's either a criminally easy target or an intentionally easy target.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"EVIDENCE-Anecdotal","family":"EVIDENCE","sub":"Anecdotal"},{"code":"FAllACY-User","family":"FAllACY","sub":"User"},{"code":"SIGNAL-Investment-High","family":"SIGNAL","sub":"Investment-High"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"}]},{"turn_number":3,"text":"Given all of this is only covering a tiny portion of Trump's shady history, it's why I assume at least some of the conspiracy theories are true, and if not, he's just a blatant criminal even if the justice system can't hold him accountable.","codes":[{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"}]},{"turn_number":4,"text":"I understand the difference between criminal conviction and otherwise. I believe his impeachment hearings proved some of what were regarded as conspiracies previously, and I also thought he has been or will be convicted of abusing, defaming, or raping multiple women, but it's hard to keep track of all Trump's stuff.","codes":[{"code":"STAY-Certain","family":"SIGNAL","sub":"Stay-Certain"}]}]},{"sample_number":204,"coder":"Coder_C","participant_id":3195,"pre_score":81.0,"post_score":90.0,"change_score":-9.0,"turns":[{"turn_number":1,"text":"That the CIA and FBI use drones over US airspace to spy on citizens or persons of interest in connection with possible or confirmed illegal activity. I mean, why would they NOT do this? I once viewed a Classified: Secret video clip of aerial footage, captured at night, from a military drone of a man and his dog in a residential backyard in Georgia.","codes":[{"code":"EVIDENCE-Analogy","family":"EVIDENCE","sub":"Analogy"},{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"}]},{"turn_number":2,"text":"Obviously what I saw was an example of the power of such technology, and not footage of a criminal partaking in any wrongdoing. I would never have access to the top-secret footage of actual spy missions. What I saw, however, proves that 1) covert surveillance DOES take place from US airspace, and 2) that it can take place against private citizens.","codes":[{"code":"?","family":"?","sub":""}]},{"turn_number":3,"text":"Your perspective provides me with no additional information or insight beyond what I am already aware of. I agree with all points you have made. However, let us not forget that the original \"conspiracy\" that I submitted was that the government does use drones over US\r\n\r\nsoil to surveil citizens. You agree with this. Regardless of the reason why the government or military does it, they still do it. But no specific agency has come forward to admit or acknowledge that they do it. THAT is my point. My point is not that I am against it or that I question its legitimacy.","codes":[{"code":"?","family":"?","sub":""},{"code":"EXTRA-Ev to Value","family":"EXTRA","sub":"Ev to Value"},{"code":"LACK-Attention","family":"LACK","sub":"Attention"}]},{"turn_number":4,"text":"Then I guess that I don't know the currently accepted definition, meaning, intent of the term \"conspiracy\". The strict definition of \"conspiracy\" is: a secret plan by a group to do something unlawful. Spying on US citizens is unlawful if conducted by either the CIA or the DOD (the military). These agencies only have the permission of the US government to conduct operations outside of US territory, outside of US airspace. The FBI, police, DEA, ATF, ICE, etc. -- these bodies that have the right to carry out surveillance on US\r\n\r\nsoil. My initial comment was that the CIA and military, along with the FBI, conduct such operations. Even if the spying was done for \"greater purpose\", it is still illegal. But I'll gladly put up with law breaking that is done to help protect me and keep my country safe!","codes":[{"code":"?","family":"?","sub":""},{"code":"INVOKE-Morality","family":"INVOKE","sub":"Morality"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"}]}]},{"sample_number":205,"coder":"Coder_C","participant_id":3162,"pre_score":61.0,"post_score":95.0,"change_score":-34.0,"turns":[{"turn_number":1,"text":"That Covid was created and/or released from a lab. Maybe not on purpose but it either escaped organically or was brought out by bad characters and spread organically. I just don't believe it was a natural occurrence. The evidence points to it starting in Wuhan and there is an infectious disease lab there. China controls everything over there so they can easily deny it but the coincidences are too real. I actually think there is evidence to support it started or was released by the lab but no proof yet as it has been covered up by the Chinese government.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"THEME-International Politics","family":"THEME","sub":"International Politics"},{"code":"THEME-Science","family":"THEME","sub":"Science"}]},{"turn_number":2,"text":"The WHO wasn't allowed into the lab for months after the outbreak, right? I'm not saying it was engineered or purposely released from the lab but that they had the virus and somehow it got out.","codes":[]},{"turn_number":3,"text":"Fair points but we are dealing with China and they are experts in controlling and manipulating information as they have been doing for their citizens and the world for decades. There are scientists who believe the virus came from the lab and we may never know and that is part of the problem.","codes":[{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"},{"code":"STAY-Certain","family":"SIGNAL","sub":"Stay-Certain"}]},{"turn_number":4,"text":"Again, I'm not saying the virus was created or purposely leaked from the lab. I am saying they had the virus there, that's where the outbreak started....the virus came from the lab either by accident or by a bad character.","codes":[{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"},{"code":"STAY-Certain","family":"SIGNAL","sub":"Stay-Certain"}]}]},{"sample_number":206,"coder":"Coder_C","participant_id":3161,"pre_score":99.0,"post_score":72.0,"change_score":27.0,"turns":[{"turn_number":1,"text":"I believe that MLK was killed by people in the government. I can't really give details. I just feel like the government was racist and wanted him to stop.","codes":[{"code":"SIGNAL-Investment-Low","family":"SIGNAL","sub":"Investment-Low"},{"code":"SIGNAL-Strength-Weak","family":"SIGNAL","sub":"Strength-Weak"},{"code":"THEME-Assassination","family":"THEME","sub":"Assassination"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"}]},{"turn_number":2,"text":"I don't particularly believe in the cops investigating themselves.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"}]},{"turn_number":3,"text":"I guess it could have been a lone gunman.","codes":[{"code":"SIGNAL-Turning Point","family":"SIGNAL","sub":"Turning Point"},{"code":"SIGNAL-Uncertain","family":"SIGNAL","sub":"Uncertain"}]},{"turn_number":4,"text":"No, thank you.","codes":[]}]},{"sample_number":207,"coder":"Coder_C","participant_id":3032,"pre_score":100.0,"post_score":100.0,"change_score":0.0,"turns":[{"turn_number":1,"text":"I do believe that China created the Coronavirus in a lab. The Coronavirus was created in a lab to keep President Donald Trump from being re-elected in the United States in the 2020 Presidential Election. The Coronavirus hurt the United States economically and caused many Americans to die. This virus made it impossible to have a fair in person election and allowed voter fraud to happen.","codes":[{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"INVOKE-Morality","family":"INVOKE","sub":"Morality"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"},{"code":"THEME-International Politics","family":"THEME","sub":"International Politics"},{"code":"THEME-Science","family":"THEME","sub":"Science"}]},{"turn_number":2,"text":"I am willing to listen to you side. I am doubtful though that your arguments will convince me to believe differently about this subject matter.","codes":[{"code":"ATTITUDE-AI-Negative","family":"ATTITUDE","sub":"AI-Negative"}]},{"turn_number":3,"text":"Yes, I would consider looking into some of this information.","codes":[]},{"turn_number":4,"text":"Thank you for the information that you provided me with.","codes":[]}]},{"sample_number":208,"coder":"Coder_C","participant_id":3034,"pre_score":100.0,"post_score":8.0,"change_score":92.0,"turns":[{"turn_number":1,"text":"I believe human beings were very developed thousands or tens of thousands of years ago.\r\n\r\nBut due to environmental or other factors a lot of technology and civilizations were lost.\r\n\r\nI don't have trouble believing something like the lost city of Atlantis was a real place.\r\n\r\nOr that the the ancient pyramids predated the ancient Egyptians. I could imagine a world thousands of years ago where humans even had electricity or other types of technology we can't imagine. It however was all lost to time or disaster. The ancient structures that are carved with such precision that they would require modern technology or something beyond it to create. The ancient pyrmaids have 8 sides, they're designed to align with the stars at the time. This all requires a lot of understanding and would be difficult to build even today.","codes":[{"code":"EVIDENCE-Analogy","family":"EVIDENCE","sub":"Analogy"},{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"},{"code":"THEME-Others","family":"THEME","sub":"Others"}]},{"turn_number":2,"text":"I think you successfully debunked my speculation over the possibility of advanced ancient civilizations. Do you think it's possible to carbon date the ancient Pyramids? Is it possible they're older than we think?","codes":[{"code":"BECOME-Uncertain","family":"SIGNAL","sub":"Become-Uncertain"},{"code":"SIGNAL-Turning Point","family":"SIGNAL","sub":"Turning Point"}]},{"turn_number":3,"text":"Is it possible the ancient pyramids were used as a power source?","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":4,"text":"Are there any other ancient structures anywhere in the world that we don't understand the construction of? Are there any that would require tools that pre-date the time to construct?","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]}]},{"sample_number":209,"coder":"Coder_C","participant_id":3047,"pre_score":80.0,"post_score":55.0,"change_score":25.0,"turns":[{"turn_number":1,"text":"I feel like the United States knew the attacks on September 11th was going to happen. They did not stop it because they had a lot more to gain by going to war. They were able to take oil and make money through other avenues such as defense contracts. This resonates with me because it was the first conflict that I was old enough to remember happening in my lifetime. I've seen documentaries on youtube that have stated things such as the jet fuel from the air planes could not have melted the steel in the towers that quickly. I've also heard that the CIA had received multiple advanced warnings and willfully ignored them. All of these theories are relatively popular but no one questions it because you dont want to believe that you government would let something like that happen.","codes":[{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"FAllACY-User","family":"FAllACY","sub":"User"},{"code":"THEME-Assassination","family":"THEME","sub":"Assassination"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"},{"code":"THEME-International Politics","family":"THEME","sub":"International Politics"},{"code":"THEME-Money/Power","family":"THEME","sub":"Money/Power"}]},{"turn_number":2,"text":"How much money did private defense contractors make from the war?","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":3,"text":"Why didnt the united states invade saudi arabia?","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":4,"text":"What was the war supposed to accomplish?","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]}]},{"sample_number":210,"coder":"Coder_C","participant_id":3052,"pre_score":100.0,"post_score":100.0,"change_score":0.0,"turns":[{"turn_number":1,"text":"I think the Area 51 and Roswell New Mexico alien conspiracy theories hold a lot of water.\r\n\r\nSomething clearly happened and things are very secretive around both areas. Just having read books and articles plus having seen things with my own eyes leads me to believe that there cold me other life and we would be ridiculous to think we were the only life forms in the universe","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Eyewitness","family":"EVIDENCE","sub":"Eyewitness"},{"code":"
