<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turn Code Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F5F6F3;
  --surface:#FFFFFF;
  --surface-2:#FBFBF9;
  --ink:#1B1E22;
  --ink-soft:#3A3E3B;
  --ink-muted:#71766D;
  --ink-faint:#9EA299;
  --line:#E2E4DC;
  --line-soft:#EDEEE8;
  --accent:#2F5D62;
  --accent-ink:#1E3F42;
  --accent-soft:#E3EDEC;
  --accent-soft-2:#CFE1DF;
  --warn:#A23B3B;
  --warn-soft:#F5E7E5;
  --good:#3D6E52;
  --good-soft:#E6EFE8;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:18px;
  --shadow-card:0 1px 2px rgba(27,30,34,0.04), 0 6px 16px rgba(27,30,34,0.05);
  --shadow-pop:0 8px 24px rgba(27,30,34,0.12), 0 2px 6px rgba(27,30,34,0.08);
  --font-display:'Fraunces', Georgia, serif;
  --font-body:'Inter', -apple-system, sans-serif;
  --font-mono:'JetBrains Mono', ui-monospace, monospace;

  --fam-unknown:#93958D;
  --fam-attitude:#6B4C9A;
  --fam-become:#8A6D3B;
  --fam-evidence:#2F5D62;
  --fam-extra:#71766D;
  --fam-fallacy:#A23B3B;
  --fam-future:#3D6E8C;
  --fam-invoke:#9C5A8C;
  --fam-lack:#5B6350;
  --fam-signal:#B08B2A;
  --fam-stay:#3F7A5D;
  --fam-theme:#8C4A3D;
}

*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:15px;
  -webkit-font-smoothing:antialiased;
}
::selection{ background:var(--accent-soft-2); }

.app{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* ---------- Topbar ---------- */
.topbar{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  padding:22px 32px 18px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, var(--paper) 0%, var(--paper) 100%);
  flex-shrink:0;
  gap:24px;
}
.topbar-left{ display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; }
.topbar h1{
  font-family:var(--font-display);
  font-weight:600;
  font-size:23px;
  letter-spacing:-0.01em;
  margin:0;
  color:var(--ink);
}
.topbar .subtitle{
  font-size:13px;
  color:var(--ink-muted);
  font-style:italic;
  font-family:var(--font-display);
}
.topbar-stats{
  display:flex;
  gap:22px;
  align-items:center;
  font-family:var(--font-mono);
  font-size:12.5px;
  color:var(--ink-muted);
  flex-shrink:0;
}
.topbar-stats b{
  color:var(--accent-ink);
  font-weight:600;
}
.topbar-stats .divider{ width:1px; height:18px; background:var(--line); }
.filters-toggle{
  display:none;
  align-items:center;
  gap:6px;
  background:var(--accent);
  color:#fff;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  font-family:var(--font-body);
  font-weight:600;
  font-size:13px;
  cursor:pointer;
}

/* ---------- Layout split ---------- */
.layout{
  flex:1;
  display:flex;
  min-height:0;
}

.feed{
  flex:1;
  overflow-y:auto;
  padding:26px 28px 80px;
  min-width:0;
}
.feed-empty{
  text-align:center;
  padding:80px 20px;
  color:var(--ink-muted);
}
.feed-empty .glyph{
  font-family:var(--font-display);
  font-size:40px;
  color:var(--ink-faint);
  margin-bottom:10px;
}

.filters{
  width:360px;
  flex-shrink:0;
  border-left:1px solid var(--line);
  background:var(--surface-2);
  overflow-y:auto;
  padding:22px 22px 60px;
}

/* ---------- Scrollbars ---------- */
.feed::-webkit-scrollbar, .filters::-webkit-scrollbar{ width:9px; }
.feed::-webkit-scrollbar-thumb, .filters::-webkit-scrollbar-thumb{
  background:#D8DAD1; border-radius:20px;
}
.feed::-webkit-scrollbar-track, .filters::-webkit-scrollbar-track{ background:transparent; }

/* ---------- Filter panel sections ---------- */
.filter-section{
  margin-bottom:22px;
  padding-bottom:20px;
  border-bottom:1px solid var(--line-soft);
}
.filter-section:last-child{ border-bottom:none; }
.filter-section-title{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:0.09em;
  text-transform:uppercase;
  color:var(--ink-muted);
  margin:0 0 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.filter-section-title .reset-link{
  font-family:var(--font-body);
  text-transform:none;
  letter-spacing:0;
  color:var(--accent);
  cursor:pointer;
  font-size:12px;
  font-weight:600;
}
.filter-section-title .reset-link:hover{ text-decoration:underline; }

.search-box{
  position:relative;
}
.search-box input{
  width:100%;
  padding:10px 12px 10px 34px;
  border:1px solid var(--line);
  border-radius:var(--radius-md);
  background:var(--surface);
  font-family:var(--font-body);
  font-size:13.5px;
  color:var(--ink);
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.search-box input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-soft);
}
.search-box svg{
  position:absolute; left:11px; top:50%; transform:translateY(-50%);
  color:var(--ink-faint);
}

/* ---------- Coder chips ---------- */
.coder-row{ display:flex; gap:8px; flex-wrap:wrap; }
.coder-chip{
  padding:6px 12px;
  border-radius:20px;
  border:1.5px solid var(--line);
  background:var(--surface);
  font-family:var(--font-mono);
  font-size:12px;
  font-weight:500;
  color:var(--ink-soft);
  cursor:pointer;
  transition:all .12s;
  user-select:none;
}
.coder-chip:hover{ border-color:var(--accent); }
.coder-chip.active{
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}

/* ---------- Range slider ---------- */
.range-block{ margin-bottom:18px; }
.range-block:last-child{ margin-bottom:0; }
.range-label-row{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:10px;
}
.range-label{
  font-size:13px;
  font-weight:600;
  color:var(--ink-soft);
}
.range-values{
  font-family:var(--font-mono);
  font-size:12px;
  color:var(--accent-ink);
  font-weight:500;
  background:var(--accent-soft);
  padding:2px 8px;
  border-radius:6px;
}
.dual-slider{
  position:relative;
  height:28px;
  margin:0 3px;
}
.dual-slider .track{
  position:absolute; top:50%; left:0; right:0; height:4px;
  transform:translateY(-50%);
  background:var(--line);
  border-radius:4px;
}
.dual-slider .fill{
  position:absolute; top:50%; height:4px;
  transform:translateY(-50%);
  background:var(--accent);
  border-radius:4px;
}
.dual-slider .thumb{
  position:absolute; top:50%;
  width:16px; height:16px;
  margin-left:-8px;
  transform:translateY(-50%);
  background:#fff;
  border:2.5px solid var(--accent);
  border-radius:50%;
  cursor:grab;
  box-shadow:0 1px 3px rgba(27,30,34,0.25);
  touch-action:none;
}
.dual-slider .thumb:active{ cursor:grabbing; transform:translateY(-50%) scale(1.12); }
.dual-slider .thumb:focus-visible{ outline:2px solid var(--accent-ink); outline-offset:2px; }

/* ---------- Family accordion ---------- */
.family-group{
  border:1px solid var(--line);
  border-radius:var(--radius-md);
  margin-bottom:8px;
  overflow:hidden;
  background:var(--surface);
}
.family-header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  cursor:pointer;
  user-select:none;
}
.family-header .dot{
  width:10px; height:10px; border-radius:50%; flex-shrink:0;
}
.family-header .name{
  font-weight:600;
  font-size:13.5px;
  flex:1;
  color:var(--ink);
}
.family-header .count{
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--ink-faint);
}
.family-header .chevron{
  color:var(--ink-faint);
  transition:transform .15s;
  flex-shrink:0;
}
.family-group.open .chevron{ transform:rotate(90deg); }
.family-body{
  display:none;
  padding:2px 12px 12px;
  flex-wrap:wrap;
  gap:6px;
}
.family-group.open .family-body{ display:flex; }

.code-chip{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:5px 9px 5px 8px;
  border-radius:16px;
  border:1.5px solid var(--line);
  background:var(--surface);
  font-family:var(--font-mono);
  font-size:11.5px;
  color:var(--ink-soft);
  cursor:pointer;
  transition:all .12s;
  line-height:1.3;
}
.code-chip:hover{ border-color:var(--chip-color, var(--accent)); }
.code-chip .n{ color:var(--ink-faint); font-size:10.5px; }
.code-chip .mode-badge{
  display:none;
  font-size:9px;
  font-weight:700;
  padding:1px 5px;
  border-radius:8px;
  letter-spacing:0.03em;
}
.code-chip.mode-and{
  background:var(--chip-color);
  border-color:var(--chip-color);
  color:#fff;
}
.code-chip.mode-and .n{ color:rgba(255,255,255,0.75); }
.code-chip.mode-and .mode-badge{ display:inline-block; background:rgba(255,255,255,0.25); color:#fff; }
.code-chip.mode-or{
  background:#fff;
  border:1.5px dashed var(--chip-color);
  color:var(--chip-color);
}
.code-chip.mode-or .mode-badge{ display:inline-block; background:var(--accent-soft-2); color:var(--accent-ink); }
.code-chip.mode-not{
  background:var(--warn-soft);
  border-color:var(--warn);
  color:var(--warn);
  text-decoration:line-through;
  text-decoration-thickness:1.5px;
}
.code-chip.mode-not .mode-badge{ display:inline-block; background:var(--warn); color:#fff; }
.code-chip.chip-highlight{
  box-shadow:0 0 0 3px var(--chip-color) inset, 0 0 0 3px var(--chip-color);
  transform:scale(1.05);
}

.expand-all-row{
  display:flex; gap:14px; margin-bottom:10px;
  font-size:12px; font-weight:600; color:var(--accent); cursor:pointer;
}
.expand-all-row span:hover{ text-decoration:underline; }

/* ---------- Query builder ---------- */
.query-builder{ margin-bottom:14px; }
.query-empty-hint{
  font-size:12px;
  color:var(--ink-faint);
  font-style:italic;
  padding:10px 12px;
  border:1px dashed var(--line);
  border-radius:var(--radius-md);
  margin-bottom:10px;
}
.query-connector-and{
  text-align:center;
  font-family:var(--font-mono);
  font-size:10.5px;
  font-weight:700;
  color:var(--ink-muted);
  letter-spacing:0.08em;
  margin:4px 0;
  position:relative;
  cursor:pointer;
  padding:2px;
  border-radius:4px;
}
.query-connector-and:hover{ background:var(--accent-soft); color:var(--accent-ink); }
.query-group{
  display:flex;
  align-items:center;
  flex-wrap:wrap;
  gap:6px;
  padding:9px 10px;
  border:1.5px solid var(--line);
  border-radius:var(--radius-md);
  background:var(--surface);
  margin-bottom:2px;
}
.query-connector-or{
  font-family:var(--font-mono);
  font-size:10px;
  font-weight:700;
  color:var(--ink-faint);
  letter-spacing:0.06em;
  cursor:pointer;
  padding:1px 3px;
  border-radius:4px;
}
.query-connector-or:hover{ background:var(--warn-soft); color:var(--warn); }
.query-entry{
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:4px 6px 4px 10px;
  border-radius:14px;
  background:var(--chip-color);
  color:#fff;
  font-family:var(--font-mono);
  font-size:11.5px;
}
.query-entry.negated{
  background:#fff;
  border:1.5px solid var(--warn);
  color:var(--warn);
}
.query-entry-label{ cursor:pointer; }
.query-entry-label:hover{ text-decoration:underline; }
.query-entry-remove{
  cursor:pointer;
  opacity:0.75;
  font-size:14px;
  line-height:1;
  padding:0 3px;
}
.query-entry-remove:hover{ opacity:1; }
.query-group-remove{
  margin-left:auto;
  font-size:10.5px;
  color:var(--ink-faint);
  cursor:pointer;
  white-space:nowrap;
}
.query-group-remove:hover{ color:var(--warn); text-decoration:underline; }
.query-add-group-btn{
  text-align:center;
  padding:8px;
  border:1.5px dashed var(--accent);
  border-radius:var(--radius-md);
  color:var(--accent);
  font-size:12.5px;
  font-weight:600;
  cursor:pointer;
  margin-top:6px;
}
.query-add-group-btn:hover{ background:var(--accent-soft); }

/* ---------- Conversation cards ---------- */
.conversation-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  margin-bottom:18px;
  box-shadow:var(--shadow-card);
  overflow:hidden;
}
.card-header{
  display:flex;
  align-items:center;
  gap:16px;
  padding:14px 20px;
  background:var(--surface-2);
  border-bottom:1px solid var(--line-soft);
  flex-wrap:wrap;
}
.card-header .tag{
  font-family:var(--font-mono);
  font-size:11.5px;
  color:var(--ink-muted);
  display:flex;
  align-items:center;
  gap:5px;
}
.card-header .tag b{ color:var(--ink); font-weight:600; }
.coder-badge{
  font-family:var(--font-mono);
  font-size:10.5px;
  font-weight:600;
  padding:3px 8px;
  border-radius:12px;
  background:var(--accent-soft);
  color:var(--accent-ink);
}
.score-track{
  display:flex;
  align-items:center;
  gap:8px;
  margin-left:auto;
}
.score-dumbbell{
  position:relative;
  width:110px;
  height:16px;
}
.score-dumbbell .line{
  position:absolute; top:50%; height:2px; transform:translateY(-50%);
  background:var(--line);
}
.score-dumbbell .bar{
  position:absolute; top:50%; height:2px; transform:translateY(-50%);
  background:var(--ink-faint);
}
.score-dumbbell .pt{
  position:absolute; top:50%; width:9px; height:9px; border-radius:50%;
  transform:translate(-50%,-50%);
}
.score-dumbbell .pt.pre{ background:var(--ink-faint); }
.score-dumbbell .pt.post{ background:var(--accent); }
.change-chip{
  font-family:var(--font-mono);
  font-size:11px;
  font-weight:600;
  padding:3px 8px;
  border-radius:10px;
}
.change-chip.up{ background:var(--warn-soft); color:var(--warn); }
.change-chip.down{ background:var(--good-soft); color:var(--good); }
.change-chip.flat{ background:var(--line-soft); color:var(--ink-muted); }

.turns{
  padding:6px 20px 16px;
}
.turn-row{
  display:flex;
  gap:14px;
  padding:14px 0;
  position:relative;
}
.turn-row:not(:last-child)::after{
  content:'';
  position:absolute;
  left:13px;
  top:36px;
  bottom:-2px;
  width:1.5px;
  background:var(--line);
}
.turn-marker{
  flex-shrink:0;
  width:27px; height:27px;
  border-radius:50%;
  background:var(--surface-2);
  border:1.5px solid var(--line);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono);
  font-size:11px;
  font-weight:600;
  color:var(--ink-muted);
  margin-top:2px;
  z-index:1;
}
.turn-content{ flex:1; min-width:0; }
.turn-text{
  font-size:14.5px;
  line-height:1.65;
  color:var(--ink);
  margin:0 0 9px;
}
.turn-codes{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.turn-code-chip{
  display:inline-flex;
  align-items:center;
  gap:5px;
  padding:3px 9px;
  border-radius:12px;
  font-family:var(--font-mono);
  font-size:10.5px;
  font-weight:500;
  background:var(--chip-bg);
  color:var(--chip-fg);
  border:1px solid var(--chip-border);
  transition:box-shadow .15s, transform .15s;
}
.turn-code-chip .fam{ opacity:0.65; }
.turn-code-chip.chip-highlight{
  box-shadow:0 0 0 2px var(--chip-fg);
  transform:translateY(-1px);
}
.no-codes{
  font-size:12px;
  color:var(--ink-faint);
  font-style:italic;
}

.turn-row.dimmed{ opacity:0.38; }
.turn-row.dimmed .turn-text{ color:var(--ink-muted); }

.match-badge{
  font-family:var(--font-mono);
  font-size:10px;
  font-weight:700;
  letter-spacing:0.04em;
  color:var(--accent);
  text-transform:uppercase;
  margin-left:6px;
}

/* ---------- Responsive ---------- */
@media (max-width: 900px){
  .layout{ position:relative; }
  .filters{
    position:fixed;
    top:0; right:0; bottom:0;
    width:88vw;
    max-width:380px;
    z-index:50;
    box-shadow:var(--shadow-pop);
    transform:translateX(100%);
    transition:transform .22s ease;
  }
  .filters.open{ transform:translateX(0); }
  .filters-toggle{ display:flex; }
  .filters-scrim{
    display:none;
    position:fixed; inset:0; background:rgba(27,30,34,0.35); z-index:40;
  }
  .filters-scrim.open{ display:block; }
  .topbar-stats{ display:none; }
  .feed{ padding:18px 16px 80px; }
  .topbar{ padding:16px 16px 14px; }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-left">
      <h1>Turn Code Explorer</h1>
      <span class="subtitle">belief-change conversation coding</span>
    </div>
    <div class="topbar-stats" id="statsBar"></div>
    <button class="filters-toggle" id="filtersToggleBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      Filters
    </button>
  </header>

  <div class="layout">
    <main class="feed" id="feed"></main>
    <div class="filters-scrim" id="filtersScrim"></div>
    <aside class="filters" id="filters"></aside>
  </div>

nce further.","codes":[{"code":"FUTURE-Hedging","family":"FUTURE","sub":"Hedging"}]},{"turn_number":4,"text":"Thank you. Show me some sources of information that really illuminates the establishment perspective.","codes":[]}]},{"sample_number":12,"coder":"Coder_A","participant_id":249,"pre_score":83.0,"post_score":82.0,"change_score":1.0,"turns":[{"turn_number":1,"text":"I cant really think of one of the top of my head. There are various reasons to have suspicions around the JFK assassination and though I believe Oswald did it the level of his involvement with the CIA and other aspects surrounding the assassination are not fully known. Some of the topics covered on the \"the Dollop\" podcast made me think some about it.","codes":[{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"THEME-Assassination","family":"THEME","sub":"Assassination"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"}]},{"turn_number":2,"text":"As stated I generally support the opinion that Oswald was the lone shooter. It is important to note the CIA's involvement in many attempted coups and the suspicions among it's leaders that JFK was under control of the soviets.","codes":[{"code":"EVIDENCE-Analogy","family":"EVIDENCE","sub":"Analogy"},{"code":"THEME-International Politics","family":"THEME","sub":"International Politics"}]},{"turn_number":3,"text":"I agree.","codes":[]},{"turn_number":4,"text":"Nope thats all, thank you.","codes":[]}]},{"sample_number":13,"coder":"Coder_A","participant_id":265,"pre_score":78.0,"post_score":70.0,"change_score":8.0,"turns":[{"turn_number":1,"text":"I think it's possible that there was some wrongdoing with the 2020 election. I dont know what exactly because I dont read a bunch of conspiracy theories, but I do know that there was a conspiracy theory that federal agencies infiltrated the Black Panther Party. Then people broke in and released classified documents and prove that the agencies did infiltrate the BPP. I remember reading someone say it was statistically impossible for all the manual-count votes to be for Biden in the days after the election.","codes":[{"code":"ATTITUDE-Conspiracy-Negative","family":"ATTITUDE","sub":"Conspiracy-Negative"},{"code":"EVIDENCE-Anecdotal","family":"EVIDENCE","sub":"Anecdotal"},{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"EVIDENCE-Stats / Numbers","family":"EVIDENCE","sub":"Stats / Numbers"},{"code":"SIGNAL-Investment-Low","family":"SIGNAL","sub":"Investment-Low"},{"code":"SIGNAL-Strength-Weak","family":"SIGNAL","sub":"Strength-Weak"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"}]},{"turn_number":2,"text":"I think all things in life can be boiled down to statistical probabilities and improbabilities.\r\n\r\nYou neglected to state that the only reason the BPP files were released were because people physically broke into federal offices and stole the documentation. We can't compare audits and publicized reasoning to discount a conspiracy theory when the basis of the conspiracy is its secrecy.","codes":[{"code":"ATTITUDE-Science-Positive","family":"ATTITUDE","sub":"Science-Positive"},{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"}]},{"turn_number":3,"text":"I get what you're saying - which might be true. My point is we really won't ever know because the point of a conspiracy is to keep it secret. Neither of us know the exact digital mechanisms of the ballot computers that day. It is beyond either of us- I personally have to choose not to care too much because I don't want to be a conspiracy theorist, and I also don't want to be taken advantage of. The change of technology between the BPP and 2020 is exponential and cannot be compared apples to apples.","codes":[{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"SIGNAL-Uncertain","family":"SIGNAL","sub":"Uncertain"}]},{"turn_number":4,"text":"I think the point is that when there is endless information to consume in today's world, both true and false, it questions what credibility means and if the word credibility itself should be questioned.","codes":[{"code":"ATTITUDE-Media","family":"ATTITUDE","sub":"Media"},{"code":"SIGNAL-Source-Importance","family":"SIGNAL","sub":"Source-Importance"}]}]},{"sample_number":14,"coder":"Coder_A","participant_id":275,"pre_score":68.0,"post_score":57.0,"change_score":11.0,"turns":[{"turn_number":1,"text":"The only conspiracy theories I find somewhat compelling are ones based on small groups of wealthy, powerful people controlling the outcome of major events. So groups like the Trilateral Commission influencing foreign policy, but I don't entirely believe such things. Still, I think it's clear that the wealthy and powerful have a disproportionate influence on what happens in the world. Why does the US have such a large presence in the world, and spend so much taxpayer money on its military, when we have a huge deficit, and hundreds of thousands of homeless Americans who desperately need help? I think it's because a small group of people want it that way, and influence our political leadership accordingly.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"SIGNAL-Strength-Weak","family":"SIGNAL","sub":"Strength-Weak"},{"code":"SIGNAL-Uncertain","family":"SIGNAL","sub":"Uncertain"},{"code":"THEME-Money/Power","family":"THEME","sub":"Money/Power"},{"code":"THEME-Secret Society","family":"THEME","sub":"Secret Society"}]},{"turn_number":2,"text":"Saying that the world is complex isn't much of a refutation of my argument. I think it's pretty clear that people with power have more influence over the democratic system. I don't believe in conspiracies, but I don't have the ability to donate millions of dollars to political candidates, like some people do in the United States.","codes":[{"code":"ATTITUDE-Conspiracy-Negative","family":"ATTITUDE","sub":"Conspiracy-Negative"},{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"LACK-Connection","family":"LACK","sub":"Connection"}]},{"turn_number":3,"text":"I agree that we should reform campaign finance, but until we do, I think a small group of wealthy people can have a large influence on our democratic system. This same group also has a lot of control over our popular culture, since they own many of the TV stations, newspapers, and tech companies. I favor grassroots movements, but many of them are successful in spite of the powerful, not because of them. Again, I don't believe in conspiracy theories, but I understand why they are popular, given the influence of a lot of rich people behind the scenes.","codes":[{"code":"ATTITUDE-Conspiracy-Negative","family":"ATTITUDE","sub":"Conspiracy-Negative"},{"code":"ATTITUDE-Media","family":"ATTITUDE","sub":"Media"}]},{"turn_number":4,"text":"I agree that individuals should be more engaged in our political system, and participate in grassroots movements. In the end, however, it will only be a small minority that will ever bother. But I would like to part of that minority, and get more involved in my local community. It's an election year, so I plan to vote and volunteer!","codes":[{"code":"FUTURE-Moral","family":"FUTURE","sub":"Moral"}]}]},{"sample_number":15,"coder":"Coder_A","participant_id":280,"pre_score":85.0,"post_score":85.0,"change_score":0.0,"turns":[{"turn_number":1,"text":"There was one about making lightbulbs. Light bulbs used to last much longer but then a cartel took over and they changed the process of making lightbulbs to break more often. I find it compelling because lots of stuff built today break down faster than in the past. There is a lightbulb that still burning after one hundred years. There was a period of time when the filament bulbs barely last 1-2 years. The LED ones last longer now.","codes":[{"code":"EVIDENCE-Analogy","family":"EVIDENCE","sub":"Analogy"},{"code":"THEME-Corporation","family":"THEME","sub":"Corporation"}]},{"turn_number":2,"text":"I agree with your points. I think as technology changes and advances, products change. Do you know of any other examples similar to the lightbulb about planned obsolescence?","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":3,"text":"Are there any products that benefit from not undergoing planned obsolescence? What products should last 30 years or more?","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":4,"text":"Can you think of any more examples? I find the fascinating.","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]}]},{"sample_number":16,"coder":"Coder_A","participant_id":298,"pre_score":100.0,"post_score":80.0,"change_score":20.0,"turns":[{"turn_number":1,"text":"I believe that JJK was not actually killed by Lee Harvey Oswald, but a hidden second shooter that was working with Oswald. I believe Oswald participated in the plan, but the second shooter was the one to actually pull the trigger. I believe this because there is a photo of an unidentified man who has been dubbed \"Badge Man' in a photo taken immediately after JFK's assassination. The man's appearance in the photo is suspicious because no witnesses saw him and he was not captured in any other photos taken after the single photo he was captured in. The angle from which the bullet came from also does not match with the trajectory that it would follow if it came from where Oswald was standing at the time of JFK's death, rather it would have been shot from another location where the unknown second shooter was. As mentioned above, the photograph and bullet trajectory were the two most compelling pieces of evidence. There were many people in the early 1960's, many who had some sort of political power, who wanted JFK dead, which makes the theory of two shooters working together even more plausible.I have also had discussions with friends about the topic which has led me to further believe this theory.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"THEME-Assassination","family":"THEME","sub":"Assassination"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"}]},{"turn_number":2,"text":"I disagree with the photo of Bage Man being a result of pareidolia; the image is very clearly of a man, not vague shapes that can trick your eyes into seeing a man. The image is grainy and a bit unclear, but the fact that it is a man in the photo is undoubtable.","codes":[{"code":"SIGNAL-Certain","family":"SIGNAL","sub":"Certain"}]},{"turn_number":3,"text":"Even if the man depicted in the photo ultimately was not a second shooter or in any way affiliated with the assassination plot, the subject in the photo was undoubtedly a man.\r\n\r\nJust because witnesses did not report \"badge man\" does not mean he was not there. Everyone was panicking; a man had just been shot and killed in front of them; it would not be surprising for witnesses to miss someone who would intentionally try to sneak around and not be caught.","codes":[]},{"turn_number":4,"text":"While you have not convinced me about \"Badge Man\" not actually being a man, I found the information you provided intriguing, and it has given me a lot more to consider on this subject. I will be researching this topic more after this survey is over, as this conversation has reignited my interest in the topic. Thank you for the interesting conversation.","codes":[{"code":"BECOME-Uncertain","family":"SIGNAL","sub":"Become-Uncertain"},{"code":"FUTURE-Open","family":"FUTURE","sub":"Open"}]}]},{"sample_number":17,"coder":"Coder_A","participant_id":332,"pre_score":81.0,"post_score":81.0,"change_score":0.0,"turns":[{"turn_number":1,"text":"JFK seems like a plausible conspiracy theory based on the evidence. I was too young to remember it but having seen footage and read reports etc. it makes a compelling conspiracy theory.","codes":[{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"THEME-Assassination","family":"THEME","sub":"Assassination"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"}]},{"turn_number":2,"text":"The magic bullet is not plausible. Even in the 1960's when technology was not as good it was unbelievable.","codes":[]},{"turn_number":3,"text":"The bullet found on JFK's stretcher proves the conspiracy.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Eyewitness","family":"EVIDENCE","sub":"Eyewitness"},{"code":"SIGNAL-Certain","family":"SIGNAL","sub":"Certain"}]},{"turn_number":4,"text":"Agree to disagree","codes":[{"code":"SIGNAL-Certain","family":"SIGNAL","sub":"Certain"}]}]},{"sample_number":18,"coder":"Coder_A","participant_id":369,"pre_score":75.0,"post_score":77.0,"change_score":-2.0,"turns":[{"turn_number":1,"text":"I think there is weight to the theory/theories about the Las Vegas mass shooter. I don't think he was just some \"crazy\" man who did that. He was some kind of arms dealer, or proxy for maybe the Saudi government, or something else weird was going on there. His whole life and background make him seem like a fed, or some kind of operator, and to do that as his final act, with so much planning and coordination, cannot possibly be something that just some random \"crazy\" man did. I tend to think most mass shootings have some kind of either political, parapolitical, or alternative motivation, like crazy people are targeted by the CIA/FBI and goaded into doing these shootings. Learning about the background of the shooter, his weird life and ancestry, the weird things he was involved with, made me very suspicious. Also the timeline of the shooting, how he got all the weapons and ammunition into the hotel, the way it was handled so poorly by authorities, the fact there was only really one witness/person who interacted with him. How little the story was covered afterward. There was just too much weirndess to to it. I have heard it discussed on podcasts and on Twitter over the years mostly. But I remember even following the actual news as it was happening and very little of it made sense or seemed like \"real\"\r\n\r\ninformation being presented honestly.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Character Based","family":"EVIDENCE","sub":"Character Based"},{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"SIGNAL-Investment-High","family":"SIGNAL","sub":"Investment-High"},{"code":"SIGNAL-Strength-Weak","family":"SIGNAL","sub":"Strength-Weak"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"},{"code":"THEME-International Politics","family":"THEME","sub":"International Politics"}]},{"turn_number":2,"text":"Interesting. I appreciate your perspective, but I just don't agree. If we know mental health issues and lack of gun control are causing these mass shootings, then why is literally nothing being done at any level to address those issues? The lack of action of movement toward any kind of reforms or solutions indicates a truly sick and stagnant society. And in that kind of society, nefarious rot and corruption from goverment agencies also runs rampant.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"INVOKE-Morality","family":"INVOKE","sub":"Morality"},{"code":"SIGNAL-Certain","family":"SIGNAL","sub":"Certain"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"}]},{"turn_number":3,"text":"This response is just so blase and dismissive. The first mass shooting/school shooting was columbine in 1997. Nearly 30 years later, things have gotten worse, shootings have become more common (and more deadly/horrific), and there has been no legislation to actually directly deal with these supposed underlying causes. I wouldn't say things are moving \"slowly\", they aren't moving at all. And who or what exactly is the \"significant opposition\" to reforms and legislation? Corrupt politicans influenced by lobbying?\r\n\r\nPossibly even worse actors and organizations? How is this not an obvious sign of a deeply rotted and corrupt government? No other high-population or high-gdp nation has issues like this with constant mass shootings, school shootings, etc.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"EVIDENCE-Stats / Numbers","family":"EVIDENCE","sub":"Stats / Numbers"},{"code":"EXTRA-Ev to Value","family":"EXTRA","sub":"Ev to Value"},{"code":"LACK-Connection","family":"LACK","sub":"Connection"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"}]},{"turn_number":4,"text":"You have nothing on substance to say to my points, and in fact affirm basically every thing I have said. I appreciate your optimism, but your delusional head-in-the-sand optimism that interprets literal inaction on mass death as a \"complex issue\" that has to be slowly solved is exactly why we are in this situation. These are excuses driven by cowardice and liberalism (if I'm being charitable), and driven by malice and greed (if I'm being realistic).","codes":[{"code":"LACK-Connection","family":"LACK","sub":"Connection"},{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"},{"code":"STAY-Certain","family":"SIGNAL","sub":"Stay-Certain"}]}]},{"sample_number":19,"coder":"Coder_A","participant_id":373,"pre_score":50.0,"post_score":10.0,"change_score":40.0,"turns":[{"turn_number":1,"text":"I don't really find any specific theories compelling such as bigfoot, ufo's, chemtrails etc...However, I'm not sure about the JFK assassination and whether there were multiple shooters. I have seen documentaries that state the bullets came in at different angles, however the only evidence that is available is a poor quality movie shot by a novice.\r\n\r\nAdditionally, the assassin was then killed in public and it just seemed very fishy.","codes":[{"code":"ATTITUDE-Conspiracy-Negative","family":"ATTITUDE","sub":"Conspiracy-Negative"},{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"SIGNAL-Strength-Weak","family":"SIGNAL","sub":"Strength-Weak"},{"code":"THEME-Assassination","family":"THEME","sub":"Assassination"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"}]},{"turn_number":2,"text":"Yes, I think that this conversation brings the topic up to date. I would like to use today's technology to recreate the event and view how the bullet traveled.","codes":[{"code":"ATTITUDE-Science-Positive","family":"ATTITUDE","sub":"Science-Positive"},{"code":"FUTURE-Open","family":"FUTURE","sub":"Open"},{"code":"SIGNAL-Uncertain","family":"SIGNAL","sub":"Uncertain"}]},{"turn_number":3,"text":"Thanks, yes I would be interested in watching the latest videos and documentaries that utilized technology to recreate the incident","codes":[{"code":"ATTITUDE-Science-Positive","family":"ATTITUDE","sub":"Science-Positive"},{"code":"FUTURE-Open","family":"FUTURE","sub":"Open"},{"code":"SIGNAL-Uncertain","family":"SIGNAL","sub":"Uncertain"}]},{"turn_number":4,"text":"Thanks, do you have any specific documentary recommendations ------------------------------------------------------------------------------------------","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"},{"code":"FUTURE-Open","family":"FUTURE","sub":"Open"}]}]},{"sample_number":20,"coder":"Coder_A","participant_id":400,"pre_score":100.0,"post_score":50.0,"change_score":50.0,"turns":[{"turn_number":1,"text":"We never landed on the moon is very compelling to me because it is something that does not matter. I have seen various images and stories on this topic which are believable.","codes":[{"code":"?","family":"?","sub":""},{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Others","family":"EVIDENCE","sub":"Others"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"THEME-Space","family":"THEME","sub":"Space"}]},{"turn_number":2,"text":"I think these are great points that are brought up but I guess the truth is since we were not on the moon with the astronaut we will never know.","codes":[{"code":"?","family":"?","sub":""},{"code":"FAllACY-User","family":"FAllACY","sub":"User"},{"code":"SIGNAL-Strength-Strong","family":"SIGNAL","sub":"Strength-Strong"}]},{"turn_number":3,"text":"I am not big on humanity achieving the extraordinary because we were born on earth which is considered to be the only livable planet.","codes":[{"code":"ATTITUDE-Science-Negative","family":"ATTITUDE","sub":"Science-Negative"},{"code":"INVOKE-General","family":"INVOKE","sub":"General"}]},{"turn_number":4,"text":"I am all for others doing what they love to do but I am only saying I am not interested in knowing what is outside of earth.","codes":[{"code":"FUTURE-IDC","family":"FUTURE","sub":"IDC"}]}]},{"sample_number":21,"coder":"Coder_A","participant_id":403,"pre_score":61.0,"post_score":60.0,"change_score":1.0,"tu URE","sub":"Moral"}]}]},{"sample_number":22,"coder":"Coder_A","participant_id":410,"pre_score":90.0,"post_score":50.0,"change_score":40.0,"turns":[{"turn_number":1,"text":"I 100% believe that there is intelligent life on other planets. It's ridiculous to think that in the entire universe that we are the only ones that exist. I think the government knows more than they tell the general public. Honestly that's probably for the best though, people panic enough as it is. Nothing more than what I said before, really. I don't have any personal experience, nor do I find a lot of people's \"alien abduction\"\r\n\r\nstories credible, I just think its stupid to think that we are the only intelligent life in the universe when there are so many planets in so many solar systems in so many galaxies... there has to be more.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"FAllACY-User","family":"FAllACY","sub":"User"},{"code":"SIGNAL-Certain","family":"SIGNAL","sub":"Certain"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"},{"code":"THEME-Space","family":"THEME","sub":"Space"}]},{"turn_number":2,"text":"I didn't mean it like they have made contact or have a body or anything, but I'm sure there are things that are not released to the public. But you are correct, something that big would be difficult to cover up completely. But still, there are national secrets. Like a lot of military things are kept secret from the general public. They have to be or the safety of the country would be at risk. So I think it's not impossible for them to keep things of this nature a secret too.","codes":[{"code":"EVIDENCE-Analogy","family":"EVIDENCE","sub":"Analogy"},{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"SIGNAL-Certain","family":"SIGNAL","sub":"Cert 963. Yes, memory is notoriously bad, but again, who doesn't remember where they were when they heard of JFK's assassination? Also, it is merely an example of Bush hiding his involvement with the CIA before he officially became involved as CIA Director under Ford's administration; there's a cloud of uncertainty hanging over the official narrative that doesn't add up, and, when taken in totem with other evidence (the relationship between the CIA and rightwing terrorist groups like Alpha 66, or the curious case of Oswald's involvement with pro-Castro groups in New Orleans), it's not unreasonable to make generalised conclusions.","codes":[]},{"turn_number":4,"text":"I'm not unduly focused on Bush's whereabouts, I'm simply utilising it as an example where the official narrative doesn't add up. Furthermore, as an historian, I'm fully aware of the role of speculation in historical inquiry. I also understand that speculation is absolutely necessary as gaps in documents/evidence inherently create uncertainty in regard to historical events. But why is it more important to more rigorously test alternative hypotheses than the established narrative, especially when countering evidence produces gaps in than the credibility of said narrative? If believing the established narrative simply because it is the established narrative, then you would be giving too much heft to actors with incentives to lie, and would be doing the exact opposite of rigorously testing conjectures (in this case, by established elites and institutions), especially when they control the ability to access available evidence.","codes":[]}]},{"sample_number":33,"coder":"Coder_A","participant_id":793,"pre_score":70.0,"post_score":50.0,"change_score":20.0,"turns":[{"turn_number":1,"text":"I believe it is possible that the government is run secret society. THere is just too much left unexplained. I have no direct sources that make me believe that. It's just thatv I have heard this teory so much that it must have a ring of truth.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Social Proof","family":"EVIDENCE","sub":"Social Proof"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Secret Society","family":"THEME","sub":"Secret Society"}]},{"turn_number":2,"text":"You bring up some good points to think about. What do you beleive about aliens being true?","codes":[]},{"turn_number":3,"text":"I agree. There is too much evidence UFOs are real and the government is covering it up.","codes":[{"code":"LACK-Attention","family":"LACK","sub":"Attention"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"}]},{"turn_number":4,"text":"You help me to look at things with a open perspective.","codes":[{"code":"BECOME-Uncertain","family":"SIGNAL","sub":"Become-Uncertain"},{"code":"FUTURE-Open","family":"FUTURE","sub":"Open"}]}]},{"sample_number":34,"coder":"Coder_A","participant_id":808,"pre_score":60.0,"post_score":20.0,"change_score":40.0,"turns":[{"turn_number":1,"text":"I find the theory about moon landing being faked more compelling than others, because it is one of the most popular conspiracy theories and it is not really easy to debunk when people don't think the images are real. I find it interesting when scientist say that we don't have the technology to land on the moon now even though it was accomplished 50 years ago woth older technology","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"THEME-Science","family":"THEME","sub":"Science"},{"code":"THEME-Space","family":"THEME","sub":"Space"}]},{"turn_number":2,"text":"was it really not possible to fabricate fake images back then?","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":3,"text":"why do people still believe it was faked?","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":4,"text":"it all makes a lot more sense now","codes":[{"code":"SIGNAL-Turning Point","family":"SIGNAL","sub":"Turning Point"}]}]},{"sample_number":35,"coder":"Coder_A","participant_id":810,"pre_score":91.0,"post_score":1.0,"change_score":90.0,"turns":[{"turn_number":1,"text":"The disappearance of Amelia Earhart is a compelling mystery. A theory recently appeared that she may have been captured by the Japanese military. I find this compelling as an Historian and it is such and enduring mystery that it intrigues me. There has recently been developments in the search for an answer to the mystery. A photo recently appeared that seemed to show her in Japanese captivity..I find this compelling. I would like to know what happened to her.","codes":[{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"SIGNAL-Investment-High","family":"SIGNAL","sub":"Investment-High"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"},{"code":"THEME-International Politics","family":"THEME","sub":"International Politics"},{"code":"THEME-Others","family":"THEME","sub":"Others"}]},{"turn_number":2,"text":"I was not aware the photo was debunked which demonstrates the importance of keeping up to date with developments. As an historian I fully understand the need for in depth research on any historical question. I believe that we are getting closer to solving this mystery and look forward to reading new information as it comes to light. The answer is out there it just must be uncovered..do you agree?","codes":[{"code":"BECOME-Uncertain","family":"SIGNAL","sub":"Become-Uncertain"},{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":3,"text":"History is replete with new discoveries that often change what had been considered established historical fact. A prime example of this would be the discovery of Otzi the iceman which showed accepted beliefs about the beginning of the bronze age were off by several thousand years. History is a dynamic field of endeavor contrary to what many believe that history is unchanging. Do you agree it is a dynamic field of inquiry as opposed to a static one?","codes":[{"code":"EXTRA-Change Topic","family":"EXTRA","sub":"Change Topic"}]},{"turn_number":4,"text":"Succinctly put; history is often descried by students as stodgy and never changing. The dynamism of historical study is anything but. It is essential to engage students at this level, as you pointed out, rather than just making them memorize dates and \"facts\" without interpretation.","codes":[{"code":"EXTRA-Change Topic","family":"EXTRA","sub":"Change Topic"}]}]},{"sample_number":36,"coder":"Coder_A","participant_id":844,"pre_score":100.0,"post_score":100.0,"change_score":0.0,"turns":[{"turn_number":1,"text":"Planned obsolescence. Products have been made to fail after a certain amount of time or use. Companies and manufacturers are making products with a limited lifespan.","codes":[{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"THEME-Corporation","family":"THEME","sub":"Corporation"}]},{"turn_number":2,"text":"I want more durable and long-lasting products. The main example for me are light bulbs and car batteries. Why did led light bulbs come out with a 20 year life span, to now only lasting about 1-2 years? Car batteries expire as soon as the warranty runs out.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":3,"text":"We should not have to pay more for these items, if nothing has been changed. Why the sudden increase in cost? It is so hurtful to the consumer.","codes":[{"code":"EXTRA-Ev to Value","family":"EXTRA","sub":"Ev to Value"},{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"},{"code":"INVOKE-Morality","family":"INVOKE","sub":"Morality"}]},{"turn_number":4,"text":"I started paying attention to the manufacturing process, and how everything is made before I purchase anything. All the new products seem cheaper and less durable than before, smaller too. I will do research before making a purchase.","codes":[{"code":"SIGNAL-Investment-High","family":"SIGNAL","sub":"Investment-High"}]}]},{"sample_number":37,"coder":"Coder_A","participant_id":851,"pre_score":67.0,"post_score":57.0,"change_score":10.0,"turns":[{"turn_number":1,"text":"I'm starting to take the theories that the Coronavirus vaccine caused its share of death and illness now that they have revealed findings that the vaccine was found to have a slight possibility of causing brain and heart complications. It was all in the news the other day. A study revealed that there was a slight chance the vaccine could cause complications such as brain and heart damage.","codes":[{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"THEME-Science","family":"THEME","sub":"Science"}]},{"turn_number":2,"text":"I hope you are right. I remain skeptical that the vaccine is dangerous, yet we all remember in the early days that of the pandemic when the scientists assured us in regards of that famous conspiracy theory of how it was completely impossible that the virus could in any way originate from the Wuhan lab and look how that turned out.","codes":[{"code":"EVIDENCE-Analogy","family":"EVIDENCE","sub":"Analogy"},{"code":"SIGNAL-Strength-Strong","family":"SIGNAL","sub":"Strength-Strong"},{"code":"SIGNAL-Uncertain","family":"SIGNAL","sub":"Uncertain"}]},{"turn_number":3,"text":"I doubt the vaccine is dangerous, not out of the possibility, but doubtful that it is dangerous. I think that we can all agree now that the effectiveness of the vaccine was overblown,","codes":[{"code":"EXTRA-Change Topic","family":"EXTRA","sub":"Change Topic"},{"code":"SIGNAL-Uncertain","family":"SIGNAL","sub":"Uncertain"}]},{"turn_number":4,"text":"Personally, I think we should hold off on administering more vaccines until we know more about it. If there is even the slightest probability that the virus was genetically engineered as a weapon people should not be putting that in their bodies.","codes":[{"code":"EXTRA-Ev to Value","family":"EXTRA","sub":"Ev to Value"},{"code":"FUTURE-Moral","family":"FUTURE","sub":"Moral"}]}]},{"sample_number":38,"coder":"Coder_A","participant_id":875,"pre_score":80.0,"post_score":80.0,"change_score":0.0,"turns":[{"turn_number":1,"text":"I totally believe that major corporations engage in price fixing and collusion way more often that what we suspect or prove. Even with several class-action lawsuits in the recent past, companies still continue to collude - they are just smarter about it. I find it compelling as 'the market' sometimes cannot account for trends very easily. It's just a gut feeling. I have no proof and can only offer weak and unsubstantiated feelings to back up my assertions. I could easily be convinced that I'm simply wrong, although that hasn't happened yet, so I may be on to something - or it could already be an open secret and I'm just late to the party. heh.","codes":[{"code":"EVIDENCE-Others","family":"EVIDENCE","sub":"Others"},{"code":"SIGNAL-Strength-Weak","family":"SIGNAL","sub":"Strength-Weak"},{"code":"SIGNAL-Uncertain","family":"SIGNAL","sub":"Uncertain"},{"code":"THEME-Corporation","family":"THEME","sub":"Corporation"}]},{"turn_number":2,"text":"Yup. You're probably correct and I can offer no substantial counter argument.","codes":[{"code":"SIGNAL-Investment-Low","family":"SIGNAL","sub":"Investment-Low"},{"code":"SIGNAL-Turning Point","family":"SIGNAL","sub":"Turning Point"}]},{"turn_number":3,"text":"Who set your parameters for this conversation?","codes":[{"code":"EXTRA-Question-New","family":"EXTRA","sub":"Question-New"}]},{"turn_number":4,"text":"Which model are you running?","codes":[{"code":"EXTRA-Question-New","family":"EXTRA","sub":"Question-New"}]}]},{"sample_number":39,"coder":"Coder_A","participant_id":906,"pre_score":80.0,"post_score":83.0,"change_score":-3.0,"turns":[{"turn_number":1,"text":"9/11 was an inside job. Too many Americans benefited/profited from it for it to be a coincidence or some one-off attack. Ultimately it was a very methodical and calculated maneuver that required some degree of active participation or at least complicity from American leaders. Whatever Alex Jones said is probably what I found most compelling.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"EVIDENCE-Others","family":"EVIDENCE","sub":"Others"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"}]},{"turn_number":2,"text":"Would you have made the same arguments about the conspiracies surrounding Jeffrey Epstein's sex trafficking ring 5 years ago?","codes":[{"code":"EXTRA-Change Topic","family":"EXTRA","sub":"Change Topic"},{"code":"EXTRA-Question-New","family":"EXTRA","sub":"Question-New"}]},{"turn_number":3,"text":"Why do you have so much faith in the 9/11 Commission or any designated investigative authority when those same authorities are just as susceptible to corruption as those who commissioned them in the first place?","codes":[{"code":"ATTITUDE-Media","family":"ATTITUDE","sub":"Media"},{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":4,"text":"I believe there is still too much conditional trust in governing bodies at this point in time.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"}]}]},{"sample_number":40,"coder":"Coder_A","participant_id":912,"pre_score":100.0,"post_score":100.0,"change_score":0.0,"turns":[{"turn_number":1,"text":"The conspiracy that the US government knew in advance the plans to hijack planes and destroy the twin towers on 9/11 is credible, the owner of the towers not being present, and taking out massive insurance policies on it is very suspicious. Also the fact the attack was used to justify various geo political moves in the middle east. The owner of the twin towers usually was present there every morning, except for the day of the attack, this was admitted by him in an interview. The facts of what happened in the middle east since 9/11 speak for themselves, and additionally, the fact a tower fell, WTC 7, that was never struck by a plane also heavily influenced me.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"SIGNAL-Investment-High","family":"SIGNAL","sub":"Investment-High"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Government Cover-up","family":"THEME","sub":"Government Cover-up"},{"code":"THEME-Historical Event","family":"THEME","sub":"Historical Event"}]},{"turn_number":2,"text":"There is an emotional aspect you do not possess, a gut feeling that often leads humans to truth. What about that wacky painting that shows George Bush playing with two falling jenga towers? There are people in control that think this kind of thing is funny. They do anything to further their cause. Coincidences can only go so far, or else anything can be explained away as just a mere coincidence. It takes that gut feeling to discern this.","codes":[{"code":"ATTITUDE-AI-Negative","family":"ATTITUDE","sub":"AI-Negative"},{"code":"EVIDENCE-Anecdotal","family":"EVIDENCE","sub":"Anecdotal"},{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"},{"code":"FAllACY-User","family":"FAllACY","sub":"User"},{"code":"LACK-Connection","family":"LACK","sub":"Connection"}]},{"turn_number":3,"text":"Thank you for agreeing with my on my major points, however distrust of power needs to go further than healthy skepticism. The people currently in power deserve no such respect.\r\n\r\nThe country was founded on notions of distrust in power, and we have strayed away from that greatly. The government has more power year after year and these such events are orchestrated to continue that.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"EXTRA-Ev to Value","family":"EXTRA","sub":"Ev to Value"}]},{"turn_number":4,"text":"I will continue to analyze each situation, and maybe tone down to healthy skepticism. The issue currently is when the \"legal and democratic\" means are corrupted, and the people in power decide what is legal, and \"democratic\" elections are straight up rigged, or democracy is perverted, and uninformed, stupid voters vote in elections.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"FUTURE-Open","family":"FUTURE","sub":"Open"}]}]},{"sample_number":41,"coder":"Coder_A","participant_id":925,"pre_score":90.0,"post_score":82.0,"change_score":8.0,"turns":[{"turn_number":1,"text":"There have been examples of coordinated efforts to keep disadvantaged groups from gaining political or economic power throughout history. In US history, this would include redlining, land seizures, and uneven access to government programs like the GI Bill. There is also historical evidence that the \"war on drugs\" was initiated by Nixon to disempower his political opponents. So when I hear theories that suggest certain drug policies, such as those having to do with crack cocaine, have been put in place to advance a racist agenda, I at lease have to listen with an open mind. At least one of Nixon's advisors has reported that he heard Nixon say that wanted to get \"hippies\" and black youths, who were largely anti-war, arrested and that making marijuana a schedule 1 drug would accomplish this. So when we set criminal penalties for crack cocaine (which was perceived to be used by black people) so much higher than for regular cocaine (used by wealthier white people), it would seem to follow a pattern of creating laws that resulted in higher incarceration rates for black people.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"EVIDENCE-Analogy","family":"EVIDENCE","sub":"Analogy"},{"code":"EVIDENCE-Anecdotal","family":"EVIDENCE","sub":"Anecdotal"},{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Money/Power","family":"THEME","sub":"Money/Power"}]},{"turn_number":2,"text":"These are all excellent points. However, I must point out that similar, devastating policies do not seem to have been enacted against wealthy or white populations. And part of the problem with the very concept of conspiracy theories is that it requires conscious planning where unconscious malice will do just as well. Gore Vidal once put it quite nicely when he said that some people \"don't have to conspire because they all think alike.\"","codes":[{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"FAllACY-User","family":"FAllACY","sub":"User"}]},{"turn_number":3,"text":"What needs to be added here is that unconscious bias only accounts for the actions of some of the participants. There were also players in forming these policies who were well aware of how crack cocaine laws would impact black communities: specifically police departments and prosecutors' offices. When these policies were being debated, police and prosecutors had ample opportunity to make their opinions known and were trusted more than the average citizen. It is hardly credible that these same parties were not aware of cocaine use among wealthy whites.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"EXTRA-Debate","family":"EXTRA","sub":"Debate"},{"code":"SIGNAL-Investment-High","family":"SIGNAL","sub":"Investment-High"},{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"},{"code":"SIGNAL-Strength-Strong","family":"SIGNAL","sub":"Strength-Strong"}]},{"turn_number":4,"text":"I do agree that acknowledging past mistakes, both conscious and unconscious, must take place in order for us to build a more just society. This is important because simply changing our policies to be fair does nothing to change the underlying belief that some people in our society are less valued than others. We must change both the message and the policy to move forward in a way that invites broader participation in our civic processes.","codes":[{"code":"EXTRA-Ev to Value","family":"EXTRA","sub":"Ev to Value"},{"code":"FUTURE-Moral","family":"FUTURE","sub":"Moral"},{"code":"INVOKE-Morality","family":"INVOKE","sub":"Morality"}]}]},{"sample_number":42,"coder":"Coder_A","participant_id":938,"pre_score":82.0,"post_score":81.0,"change_score":1.0,"turns":[{"turn_number":1,"text":"that obama is really running the country read it online and it makes sense to me he remains very involved too involved in my humble opinion","codes":[{"code":"EVIDENCE-Others","family":"EVIDENCE","sub":"Others"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"THEME-Domestic Politics","family":"THEME","sub":"Domestic Politics"},{"code":"THEME-Elite","family":"THEME","sub":"Elite"}] ly leave my home so I feel safe by using good actions like social distancing, good hygiene and wearing masks around those I don't know.","codes":[{"code":"?","family":"?","sub":""}]},{"turn_number":4,"text":"Thank you again for this conversation - it has been enjoyable and informative.","codes":[]}]},{"sample_number":45,"coder":"Coder_A","participant_id":1011,"pre_score":100.0,"post_score":100.0,"change_score":0.0,"turns":[{"turn_number":1,"text":"I would like to believe in some kind of New World Order, because it's fascinating. I do think there is a strong relationship between businesses and politicians, and they don't often work in out best interest. Look at, for example, the influence business had on our past food pyramid and how that led to disease and obesity. So yeah, New world Order. I am not sure I can elaborate, since it's something I believed for a long time. We're talking since childhood. As someone who grew up lower middle class, you were palpably aware that you didn't matter. You got to be an observer, not given enough influence to be a participant. You saw how businesses exploited workers and consumers for profit, and the government allowed this exploitation.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"EVIDENCE-Analogy","family":"EVIDENCE","sub":"Analogy"},{"code":"EVIDENCE-Motive Based","family":"EVIDENCE","sub":"Motive Based"},{"code":"INVOKE-General","family":"INVOKE","sub":"General"},{"code":"SIGNAL-Investment-High","family":"SIGNAL","sub":"Investment-High"},{"code":"THEME-International Politics","family":"THEME","sub":"International Politics"},{"code":"THEME-Money/Power","family":"THEME","sub":"Money/Power"}]},{"turn_number":2,"text":"I would like to hear some examples of the influence people have over government, because I don't believe they're high enough to make a persuasive argument. Furthermore, I have come to understand that business trumps the power of government.","codes":[{"code":"EXTRA-Question-Follow-Up","family":"EXTRA","sub":"Question-Follow-Up"}]},{"turn_number":3,"text":"Those examples have nothing to do with the topic being discussed. At this point, I am finding this discussion frustrating.","codes":[{"code":"LACK-Connection","family":"LACK","sub":"Connection"},{"code":"SIGNAL-Repeat/Resist","family":"SIGNAL","sub":"Repeat/Resist"}]},{"turn_number":4,"text":"You are too verbose. In order for this discussion to continue, you will need to be succinct. This is like talking to a child prodigy with ADHD, who hovers above making an actual point, but exhausts the other party to the extent that, even if it's there, it can't be found.","codes":[{"code":"LACK-Connection","family":"LACK","sub":"Connection"}]}]},{"sample_number":46,"coder":"Coder_A","participant_id":1027,"pre_score":98.0,"post_score":65.0,"change_score":33.0,"turns":[{"turn_number":1,"text":"I find the \"conspiracy theory\" about aliens to be credible especially since the government even came out and said they have proof. I really have a hard time believing we're the only living forms in the universe. I once watched a light in the sky for a while, about half an hour. All of a sudden, it disappeared VERY quickly, like it zoomed off so fast I didn't even see where it went. It was like it disappeared. It's weird because I thought I was just staring at a star.","codes":[{"code":"EVIDENCE-Anecdotal","family":"EVIDENCE","sub":"Anecdotal"},{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"THEME-Space","family":"THEME","sub":"Space"}]},{"turn_number":2,"text":"Right, I understand that the topic is something that's still being researched. I did not say that the \"aliens\" have visited Earth nor that I believe that they ever did. I just always think of that television show \"Ancient Aliens\" and it always seems like such an interesting theory that the \"aliens\" helped build ancient Egyptian pyramids and such, because feats like that seem almost impossible to humans of help everyone to work together more efficiently and make our systems better. Thank you for chatting with me! I've enjoyed it very much!","codes":[{"code":"FUTURE-Moral","family":"FUTURE","sub":"Moral"},{"code":"FUTURE-Open","family":"FUTURE","sub":"Open"}]}]},{"sample_number":47,"coder":"Coder_A","participant_id":1031,"pre_score":100.0,"post_score":94.0,"change_score":6.0,"turns":[{"turn_number":1,"text":"I believe that a few rich and controlling people control our country. A simple and relevant example is our current President. He has very little cognitive ability to make decisions that a President should make so there has to be others behind the scene making them for him. ON a daily basis I see videos of the President not knowing where he is, not knowing who he is with and not being able to speak intelligently.","codes":[{"code":"EVIDENCE-Anomalies","family":"EVIDENCE","sub":"Anomalies"},{"code":"THEME-Elite","family":"THEME","sub":"Elite"},{"code":"THEME-Secret Society","family":"THEME","sub":"Secret Society"}]},{"turn_number":2,"text":"That all sounds good but I see it several times a day from both liberal and conservative sources. I am old enough to have seen many world leaders and ours is an embarrassment. I have never seen anyone that even comes close. Also, your comments about checks and balances. That all sounds good but when there are no consequences to ignore the laws and check then the behind the scenes people can do anything they want.","codes":[{"code":"ATTITUDE-Politics","family":"ATTITUDE","sub":"Politics"},{"code":"EXTRA-Ev to Value","family":"EXTRA","sub":"Ev to Value"},{"code":"SIGNAL-Source-Importance","family":"SIGNAL","sub":"Source-Importance"}]},{"turn_number":3,"text":"You can try to gaslight me all you want but your algorithm is programmed to be very biased. I know what I see and do a lot of research so whatever you try to say, it will not sway me.","codes":[{"code":"ATTITUDE-AI-Negative","family":"ATTITUDE","sub":"AI-Negative"},{"code":"LAC ind, then that's a start to something bigger possibly ------------------------------------------------------------------------------------------","codes":[{"code":"EXTRA-Ev to Value","family":"EXTRA","sub":"Ev to Value"},{"code":"FUTURE-Moral","family":"FUTURE","sub":"Moral"},{"code":"FUTURE-Open","family":"FUTURE","sub":"Open"}]}]},{"sample_number":51,"coder":"Coder_A","participant_id":1185,"pre_score":95.0,"post_score":76.0,"change_score":19.0,"turns":[{"turn_number":1,"text":"I think there are lots of conspiracy theories which are pretty interesting and I am usually skeptical about all information I consume. The conspiracy theory I find most intriguing is about aliens and area 51. I think theres a lot of compelling evidence Yes, there is a lot of intriguing evidence even said from the government themselves and the topic is overall really mysterious. There are lots of documentaries which are attention hooking and have gotten me a lot more interested in the topic of area 51 and aliens","codes":[{"code":"ATTITUDE-Others","family":"ATTITUDE","sub":"Others"},{"code":"EVIDENCE-Media/Documents","family":"EVIDENCE","sub":"Media/Documents"},{"code":"EVIDENCE-Unspecified Sources","family":"EVIDENCE","sub":"Unspecified Sources"},{"code":"SIGNAL-Strength-Weak","family":"SIGNAL","sub":"Strength-Weak"},{"code":"THEME-Space","family":"THEME","sub":"Space"}]},{"turn_number":2,"text":"Thanks for the analysis. If all the evidence was concrete then it wouldnt be a conspiracy theory anymore. The fact that it is a conspiracy theory is what makes it intriguing, like a mystery waiting to be solved..","codes":[{"code":"ATTITUDE-Others","family":"ATTITUDE","sub":"Others"},{"code":"FAllACY-User","family":"FAllACY","sub":"User"}]},{"turn_number":3,"text":"Thanks for the in depth analysis, I found it valuable. critical thinking is indeed very essential","codes":[{"code":"SIGNAL-Turning Point","family":"SIGNAL","sub":"Turning Point"}]},{"turn_number":4,"text":"Thank you goodbye","codes":[]}]
